<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CampusDuka | Add Product</title>

<style>

body{
font-family:Poppins,sans-serif;
margin:0;
background:#f5f5f5;
}

.navbar{
background:#0a74da;
padding:15px 20px;
}

.logo{
color:white;
font-size:28px;
font-weight:bold;
text-decoration:none;
}

.container{

width:90%;
max-width:450px;

margin:50px auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:
0 4px 15px rgba(0,0,0,.1);

}

h2{

text-align:center;
color:#0a74da;

}

input,textarea,select{

width:100%;
padding:12px;
margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

}

textarea{

height:100px;

}

button{

width:100%;
padding:12px;

background:#0a74da;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#085cb4;

}

</style>

</head>

<body>

<nav class="navbar">

<a href="index2.html"
class="logo">

CampusDuka

</a>

</nav>

<div class="container">

<h2>Add Product</h2>

<input
id="name"
placeholder="Product Name">

<textarea
id="description"
placeholder="Description">
</textarea>

<input
id="price"
type="number"
placeholder="Price">

<input
id="image1"
placeholder="Main Image URL">

<input
id="image2"
placeholder="Second Image URL">

<input
id="image3"
placeholder="Third Image URL">

<input
id="image4"
placeholder="Fourth Image URL">

<select id="category">

<option>
Electronics
</option>

<option>
Fashion
</option>

<option>
Food
</option>

<option>
Books
</option>

</select>

<button onclick="addProduct()">

Add Product

</button>

</div>


<script>

async function addProduct(){

const product={

name:
document.getElementById(
"name"
).value,

description:
document.getElementById(
"description"
).value,

price:
document.getElementById(
"price"
).value,

images:[

document.getElementById(
"image1"
).value,

document.getElementById(
"image2"
).value,

document.getElementById(
"image3"
).value,

document.getElementById(
"image4"
).value

],

category:
document.getElementById(
"category"
).value

};

const response=
await fetch(

"https://campusduka-api.onrender.com/add-product",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(
product
)

}

);

const data=
await response.json();

alert(
data.message
);

}

</script>

</body>
</html>
