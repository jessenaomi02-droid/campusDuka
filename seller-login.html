<!DOCTYPE html>
<html>

<head>

<title>Seller Login</title>

<style>

body{

font-family:Poppins,sans-serif;

background:#f5f7fb;

padding:30px;

}

.box{

max-width:400px;

margin:auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

input,button{

width:100%;

padding:12px;

margin:10px 0;

}

button{

background:#0077ff;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="box">

<h2>

Seller Login

</h2>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="sellerLogin()">

Login

</button>

</div>

<script>

async function sellerLogin(){

try{

const data={

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

};

const response=
await fetch(

"https://campusduka-api.onrender.com/seller-login",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

}

);

const result=
await response.json();

if(result.success){

localStorage.setItem(

"seller",

JSON.stringify(result.seller)

);

alert("Login successful");

window.location.href=
"seller-dashboard.html";

}else{

alert(result.message);

}

}catch(error){

console.log(error);

alert("Something went wrong");

}

}

</script>

</body>
</html>
