<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | CampusDuka</title>
<!-- Google Fonts & FontAwesome Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f5f7fb;
  color: #222;
}

/* ================= CAMPUSDUKA ORIGINAL NAVBAR ================= */
.navbar {
  background: #0077ff;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: white;
  font-size: 24px;
  font-weight: bold;
}

.logo a {
  color: white;
  text-decoration: none;
}

/* ================= STRUCTURED CONTAINER ================= */
.container {
  max-width: 850px;
  margin: 30px auto;
  padding: 20px;
}

.page-title {
  font-size: 30px;
  font-weight: bold;
  margin-bottom: 25px;
  color: #222;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ================= ORGANISED ORDER TRACKING CARDS ================= */
.order-card {
  background: white;
  padding: 25px;
  margin-bottom: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
  border: 1px solid #eee;
}

.order-img {
  width: 100%;
  max-height: 230px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 20px;
}

.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.order-header h2 {
  font-size: 22px;
  font-weight: bold;
  color: #222;
}

.amount {
  color: #0077ff;
  font-weight: bold;
  font-size: 20px;
}

.order-id {
  font-size: 14px;
  color: #666;
  margin-bottom: 15px;
  font-weight: 500;
}

/* ================= ORGANISED METRIC GRID ================= */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  background: #f9fbfd;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #f0f4f8;
  margin-bottom: 15px;
}

.info {
  font-size: 14px;
  color: #444;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info strong {
  color: #222;
}

/* ================= CLEAN REFINED BADGES ================= */
.status-badge {
  display: inline-block;
  padding: 8px 16px;
  border-radius: 30px;
  font-weight: bold;
  font-size: 13px;
  text-transform: capitalize;
  margin-top: 5px;
}

.pending { background: #fff3cd; color: #856404; }
.preparing { background: #ffe5b4; color: #d97706; }
.delivery { background: #dbeafe; color: #1d4ed8; }
.delivered { background: #dcfce7; color: #15803d; }

/* ================= STEP TIMELINE SYSTEM ================= */
.timeline {
  margin-top: 25px;
  padding-top: 20px;
  border-top: 1px solid #eee;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.step {
  padding: 12px 6px;
  border-radius: 10px;
  background: #f5f5f5;
  text-align: center;
  font-size: 12px;
  color: #666;
  font-weight: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.step.active {
  background: #0077ff;
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0, 119, 255, 0.2);
}

.no-orders {
  background: white;
  padding: 40px;
  text-align: center;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
  color: #666;
}

@media(max-width: 600px) {
  .timeline {
    grid-template-columns: 1fr;
  }
  .step {
    flex-direction: row;
    justify-content: center;
    padding: 12px;
  }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <a href="index2.html">CampusDuka</a>
  </div>
</nav>

<div class="container">
  <h1 class="page-title">📦 My Orders</h1>
  <div id="ordersList"></div>
</div>

<script>
let syncInterval = null;

async function loadOrders() {
    let phone = localStorage.getItem("buyerPhone");
    if (!phone) {
        document.getElementById("ordersList").innerHTML = `
        <div class="no-orders">
            No active buyer session found. Please log in to view your orders.
        </div>`;
        return;
    }

    if (phone.startsWith("0")) {
        phone = "254" + phone.substring(1);
    }

    try {
        const response = await fetch(`https://campusduka-api.onrender.com/orders/${phone}`);
        if (!response.ok) throw new Error("Could not pull backend records.");
        
        const orders = await response.json();
        const container = document.getElementById("ordersList");
        
        let compiledHTML = "";

        if (!orders || orders.length === 0) {
            container.innerHTML = `<div class="no-orders">No orders found.</div>`;
            return;
        }

        orders.forEach(order => {
            // Null Checking & Clean Status Formatting
            let rawStatus = order.delivery_status ? order.delivery_status.toLowerCase() : "pending";
            let badgeClass = "pending";
            let readableStatus = "Pending";

            if (rawStatus === "preparing") {
                badgeClass = "preparing";
                readableStatus = "Preparing";
            } else if (rawStatus === "out_for_delivery") {
                badgeClass = "delivery";
                readableStatus = "Out For Delivery";
            } else if (rawStatus === "delivered") {
                badgeClass = "delivered";
                readableStatus = "Delivered";
            }

            // Extract data securely from root layer or nested item objects
            let productData = order.product || {};
            
            let productName = order.product_name || productData.name || productData.title || "Marketplace Product";
            
            let rawPrice = order.product_price || productData.price || 0;
            let productPrice = Number(rawPrice).toLocaleString();
            
            let deliveryLocation = order.delivery_location && order.delivery_location !== "null" ? order.delivery_location : "Not Specified";
            let paymentStatus = order.payment_status && order.payment_status !== "null" ? order.payment_status : "Paid";
            let orderId = order.id || "N/A";

            // Timestamp Parsing Block
            let formattedDateTime = "Date Unrecorded";
            let timeSource = order.created_at || order.date;
            if (timeSource && timeSource !== "null") {
                const parsedDate = new Date(timeSource);
                if (!isNaN(parsedDate)) {
                    formattedDateTime = parsedDate.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    }) + " at " + parsedDate.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            }

            // Image fallback checks
            let productImage = 'images/default-package.jpg';
            if (order.product_images && order.product_images.length > 0) {
                productImage = order.product_images[0];
            } else if (productData.images && productData.images.length > 0) {
                productImage = productData.images[0];
            } else if (productData.image) {
                productImage = productData.image;
            }

            compiledHTML += `
            <div class="order-card">
                <img src="${productImage}" class="order-img" alt="${productName}">
                
                <div class="order-header">
                    <h2>${productName}</h2>
                    <div class="amount">KES ${productPrice}</div>
                </div>
                
                <div class="order-id">Order #${orderId}</div>
                
                <div class="info-grid">
                    <div class="info"><i class="far fa-calendar-alt"></i> <span><strong>Placed:</strong> ${formattedDateTime}</span></div>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> <span><strong>Location:</strong> ${deliveryLocation}</span></div>
                    <div class="info"><i class="far fa-credit-card"></i> <span><strong>Payment:</strong> ${paymentStatus}</span></div>
                </div>

                <div>
                    <span class="status-badge ${badgeClass}">${readableStatus}</span>
                </div>

                <div class="timeline">
                    <div class="step ${rawStatus === "pending" ? "active" : ""}">
                        <i class="fas fa-hourglass-start"></i> Pending
                    </div>
                    <div class="step ${rawStatus === "preparing" ? "active" : ""}">
                        <i class="fas fa-box"></i> Preparing
                    </div>
                    <div class="step ${rawStatus === "out_for_delivery" ? "active" : ""}">
                        <i class="fas fa-truck"></i> Shipping
                    </div>
                    <div class="step ${rawStatus === "delivered" ? "active" : ""}">
                        <i class="fas fa-check-double"></i> Delivered
                    </div>
                </div>
            </div>`;
        });

        container.innerHTML = compiledHTML;

    } catch(err) {
        console.error("Live fetch error sync failure:", err);
    }
}

// Intermittent polling timeline configurations (30-second cycles)
window.onload = () => {
    loadOrders();
    if(syncInterval) clearInterval(syncInterval);
    syncInterval = setInterval(loadOrders, 30000); 
};
</script>
</body>
</html>
