<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders | CampusDuka</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
}

.navbar{
background:#0077ff;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:24px;
font-weight:bold;
}

.logo a{
color:white;
text-decoration:none;
}

.container{
max-width:1000px;
margin:30px auto;
padding:20px;
}

.page-title{
font-size:30px;
font-weight:bold;
margin-bottom:20px;
color:#222;
}

.search-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:25px;
}

.search-box input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

.search-box button{
margin-top:12px;
width:100%;
padding:14px;
background:#0077ff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.order-card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.order-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.order-id{
font-size:20px;
font-weight:bold;
}

.amount{
color:#0077ff;
font-weight:bold;
font-size:18px;
}

.info{
margin:8px 0;
color:#444;
}

.status-badge{
display:inline-block;
padding:10px 15px;
border-radius:30px;
font-weight:bold;
margin-top:10px;
}

.pending{
background:#fff3cd;
color:#856404;
}

.preparing{
background:#ffe5b4;
color:#d97706;
}

.delivery{
background:#dbeafe;
color:#1d4ed8;
}

.delivered{
background:#dcfce7;
color:#15803d;
}

.timeline{
margin-top:20px;
padding-top:20px;
border-top:1px solid #eee;
}

.step{
padding:12px;
margin-bottom:10px;
border-radius:10px;
background:#f5f5f5;
}

.active{
background:#0077ff;
color:white;
font-weight:bold;
}

.no-orders{
background:white;
padding:30px;
text-align:center;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">

<a href="index2.html">

CampusDuka

</a>

</div>

</nav>

<div class="container">

<h1 class="page-title">

📦 My Orders

</h1>





<div id="ordersList">

</div>

</div>

<script>

async function loadOrders(){

let phone =
localStorage.getItem(
"buyerPhone"
);
if(phone.startsWith("0")){
phone =
"254" + phone.substring(1);
}
  console.log(phone);

const response =
await fetch(
`https://campusduka-api.onrender.com/orders/${phone}`
);

const orders =
await response.json();

const container =
document.getElementById(
"ordersList"
);

container.innerHTML = "";

if(!orders.length){

container.innerHTML =

`
<div class="no-orders">

No orders found.

</div>
`;

return;

}

orders.forEach(order=>{

let badgeClass="pending";

if(
order.delivery_status==="preparing"
){
badgeClass="preparing";
}

if(
order.delivery_status==="out_for_delivery"
){
badgeClass="delivery";
}

if(
order.delivery_status==="delivered"
){
badgeClass="delivered";
}

container.innerHTML +=

`
<div class="order-card">

<div class="order-header">

<div class="order-id">

Order #${order.id}

</div>

<div class="amount">

KES ${order.amount}

</div>

</div>

<div class="info">

📞 ${order.buyer_phone}

</div>

<div class="info">

📍 ${order.delivery_location}

</div>

<div class="info">

💳 Payment:
${order.payment_status}

</div>

<div class="status-badge ${badgeClass}">

${order.delivery_status}

</div>

<div class="timeline">

<div class="step ${
order.delivery_status==="pending"
?"active":""
}">

⏳ Pending

</div>

<div class="step ${
order.delivery_status==="preparing"
?"active":""
}">

📦 Preparing

</div>

<div class="step ${
order.delivery_status==="out_for_delivery"
?"active":""
}">

🚚 Out For Delivery

</div>

<div class="step ${
order.delivery_status==="delivered"
?"active":""
}">

✅ Delivered

</div>

</div>

</div>

`;

});

}
  window.onload = ()=>{

const phone =
localStorage.getItem(
"buyerPhone"
);

if(phone){

loadOrders();

}

};

</script>

</body>

</html>
