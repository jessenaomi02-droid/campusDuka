<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track My Orders | CampusDuka</title>
  <!-- Google Fonts & FontAwesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/3405/3405824.png">

  <style>
    :root {
      --primary: #0077ff;
      --primary-hover: #005ecb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-700: #334155;
      --slate-900: #0f172a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f6fa;
      color: var(--slate-900);
    }

    /* ================= CAMPUSDUKA NAVBAR ================= */
    .navbar {
      background: var(--slate-900);
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .logo {
      color: white;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo a {
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span {
      color: var(--primary);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* Notification Bell Drawer Trigger */
    .notif-bell-btn {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      position: relative;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .notif-bell-btn:hover {
      color: white;
      background: #334155;
    }

    .bell-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--danger);
      color: white;
      font-size: 10px;
      font-weight: bold;
      height: 18px;
      width: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ================= STRUCTURED CONTAINER & PROFILE BANNER ================= */
    .container {
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Profile Welcome Banner Card */
    .profile-banner {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 18px;
      padding: 30px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15);
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 65px;
      height: 65px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      border: 3px solid rgba(255, 255, 255, 0.2);
    }

    .profile-text h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .profile-text p {
      color: #94a3b8;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .active-badge {
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid var(--success);
      color: #34d399;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ================= REFINED ORDER CARDS ================= */
    .order-card {
      background: white;
      padding: 26px;
      margin-bottom: 26px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      border: 1px solid var(--slate-200);
      transition: all 0.25s ease;
    }

    .order-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .order-body {
      display: flex;
      gap: 24px;
      margin-bottom: 22px;
    }

    .order-img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--slate-100);
      background: var(--slate-50);
      flex-shrink: 0;
    }

    .order-details {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
    }

    .order-header h2 {
      font-size: 19px;
      font-weight: 600;
      color: var(--slate-900);
      line-height: 1.4;
    }

    .amount {
      color: var(--primary);
      font-weight: 700;
      font-size: 20px;
      white-space: nowrap;
    }

    .seller-id {
      font-size: 12px;
      color: #64748b;
      margin-top: 5px;
      font-weight: 500;
      background: var(--slate-50);
      padding: 3px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    /* ================= METRIC INFORMATION GRID ================= */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      background: var(--slate-50);
      padding: 18px;
      border-radius: 14px;
      border: 1px solid var(--slate-100);
      margin-bottom: 22px;
    }

    .info {
      font-size: 13px;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .info i {
      color: #94a3b8;
      font-size: 15px;
      width: 18px;
      text-align: center;
    }

    .info strong {
      color: var(--slate-900);
    }

    /* ================= STATUS BADGES ================= */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 12px;
      text-transform: capitalize;
    }

    .badge-pending { background: #fef3c7; color: #d97706; }
    .badge-preparing { background: #ffe4e6; color: #e11d48; }
    .badge-delivery { background: #e0f2fe; color: #0284c7; }
    .badge-delivered { background: #dcfce7; color: #16a34a; }

    /* ================= TIMELINE SYSTEM ================= */
    .timeline {
      margin-top: 25px;
      padding-top: 25px;
      border-top: 1px solid var(--slate-100);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      position: relative;
    }

    .step {
      padding: 12px 6px;
      border-radius: 10px;
      background: var(--slate-100);
      text-align: center;
      font-size: 11px;
      color: #64748b;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .step.active {
      background: #e0f2fe;
      color: #0369a1;
    }

    .step.current {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3);
    }

    .step i {
      font-size: 15px;
    }

    /* ================= NOTIFICATIONS POPUP DRAWER ================= */
    .notification-drawer {
      position: fixed;
      top: 85px;
      right: 40px;
      width: 350px;
      background: white;
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
      z-index: 1001;
      display: none;
      max-height: 450px;
      overflow-y: auto;
    }

    .notif-header {
      padding: 15px 20px;
      font-weight: 700;
      font-size: 14px;
      background: var(--slate-50);
      border-bottom: 1px solid var(--slate-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notif-header button {
      border: none;
      background: var(--slate-100);
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      color: var(--slate-700);
      transition: background 0.2s;
    }

    .notif-header button:hover {
      background: var(--slate-200);
    }

    .notif-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--slate-100);
      font-size: 12px;
      line-height: 1.5;
      color: var(--slate-700);
      cursor: pointer;
      transition: background 0.2s;
    }

    .notif-item:hover {
      background: var(--slate-50);
    }

    .notif-item.unread {
      background: #eff6ff;
      border-left: 3px solid var(--primary);
    }

    .notif-item .notif-title {
      font-weight: 700;
      color: var(--slate-900);
      margin-bottom: 3px;
    }

    .notif-item .notif-time {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .no-orders {
      background: white;
      padding: 60px 40px;
      text-align: center;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      border: 1px solid var(--slate-200);
      color: #64748b;
    }

    .no-orders i {
      font-size: 55px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .no-orders p {
      font-size: 16px;
      font-weight: 500;
    }

    @media(max-width: 768px) {
      .navbar {
        padding: 15px 20px;
      }
      .profile-banner {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }
      .active-badge {
        align-self: flex-start;
      }
      .notification-drawer {
        right: 20px;
        width: calc(100vw - 40px);
      }
    }

    @media(max-width: 650px) {
      .order-body {
        flex-direction: column;
      }
      .order-img {
        width: 100%;
        height: 200px;
      }
      .timeline {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .step {
        flex-direction: row;
        justify-content: flex-start;
        padding: 14px 20px;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <a href="index2.html"><i class="fas fa-store"></i> Campus<span>Duka</span></a>
  </div>
  <div class="nav-actions">
    <div class="notif-bell-btn" onclick="toggleNotifications()">
      <i class="fas fa-bell"></i>
      <span id="notif-count" class="bell-badge" style="display: none;">0</span>
    </div>
  </div>
</nav>

<!-- Sliding System Notification Drawer -->
<div id="notif-drawer" class="notification-drawer">
  <div class="notif-header">
    <span>System Alerts & Order Tracks</span>
    <button onclick="clearNotifications()">Clear All</button>
  </div>
  <div id="notif-list-container">
    <div class="notif-item" style="text-align: center; color: #94a3b8; padding: 30px;">No new notifications.</div>
  </div>
</div>

<div class="container">
  
  <!-- Premium Profile Welcome Banner -->
  <div class="profile-banner">
    <div class="profile-info">
      <div class="avatar" id="buyerAvatar">C</div>
      <div class="profile-text">
        <h2 id="buyerWelcomeName">Welcome, Campus Shopper 👋</h2>
        <p><i class="fas fa-phone-alt"></i> Connected: <span id="buyerDisplayPhone">011...</span></p>
      </div>
    </div>
    <div class="active-badge" id="activeOrderCount">
      Checking Active Orders...
    </div>
  </div>

  <h1 class="page-title"><i class="fas fa-box" style="color: var(--primary);"></i> Active Purchase Pipelines</h1>
  <div id="ordersList"></div>
</div>

<script>
let syncInterval = null;
const FALLBACK_IMAGE = 'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=300';

// In-app notifications persistence store
let buyerNotifications = [];

function cleanPostgresArray(imgStr) {
  if (!imgStr) return null;
  if (Array.isArray(imgStr)) return imgStr[0] || null;
  
  let cleaned = imgStr.replace(/[{}]/g, '');
  let arr = cleaned.split(',');
  return arr[0] ? arr[0].replace(/"/g, '').trim() : null;
}

// Play notification sound chime when order status updates
function playNotifySound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.type = "sine";
    // Play a delightful double beep
    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5 key
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    osc.start();
    
    setTimeout(() => {
      osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 key
    }, 80);
    
    osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {
    console.log("Audio contexts pending interaction permission restrictions.");
  }
}

// Render dynamic elements for Notification Center
function syncNotificationsUI() {
  const container = document.getElementById("notif-list-container");
  const countBadge = document.getElementById("notif-count");
  
  if (buyerNotifications.length === 0) {
    container.innerHTML = `<div class="notif-item" style="text-align: center; color: #94a3b8; padding: 30px;">No new tracking alerts.</div>`;
    countBadge.style.display = "none";
    return;
  }

  const unreadCount = buyerNotifications.filter(n => n.unread).length;
  if (unreadCount > 0) {
    countBadge.innerText = unreadCount;
    countBadge.style.display = "flex";
  } else {
    countBadge.style.display = "none";
  }

  container.innerHTML = buyerNotifications.map((n, idx) => `
    <div class="notif-item ${n.unread ? 'unread' : ''}" onclick="markAsRead(${idx})">
      <div class="notif-title">${n.title}</div>
      <div>${n.message}</div>
      <div class="notif-time">${n.timestamp}</div>
    </div>
  `).join('');
}

function appendNotification(title, message) {
  buyerNotifications.unshift({
    title,
    message,
    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
    unread: true
  });
  localStorage.setItem(`buyer_notifs_${localStorage.getItem("buyerPhone")}`, JSON.stringify(buyerNotifications));
  syncNotificationsUI();
  playNotifySound();
}

function markAsRead(idx) {
  buyerNotifications[idx].unread = false;
  localStorage.setItem(`buyer_notifs_${localStorage.getItem("buyerPhone")}`, JSON.stringify(buyerNotifications));
  syncNotificationsUI();
}

function clearNotifications() {
  buyerNotifications = [];
  localStorage.removeItem(`buyer_notifs_${localStorage.getItem("buyerPhone")}`);
  syncNotificationsUI();
}

function toggleNotifications() {
  const drawer = document.getElementById("notif-drawer");
  drawer.style.display = drawer.style.display === "block" ? "none" : "block";
}

async function loadOrders() {
    let phone = localStorage.getItem("buyerPhone");
    let buyerName = localStorage.getItem("buyerName") || "Valued Shopper";
    
    // Set Profile UI Elements
    document.getElementById("buyerWelcomeName").innerText = `Welcome, ${buyerName} 👋`;
    document.getElementById("buyerDisplayPhone").innerText = phone || "None";
    document.getElementById("buyerAvatar").innerText = buyerName.charAt(0).toUpperCase();

    if (!phone) {
        document.getElementById("ordersList").innerHTML = `
        <div class="no-orders">
            <i class="fas fa-user-lock"></i>
            <p>No active session found. Please check out or register to view your live orders.</p>
        </div>`;
        document.getElementById("activeOrderCount").style.display = "none";
        return;
    }

    if (phone.startsWith("0")) {
        phone = "254" + phone.substring(1);
    }

    try {
        const response = await fetch(`https://campusduka-api.onrender.com/orders/${phone}`);
        if (!response.ok) throw new Error("Database fetch error.");
        
        const orders = await response.json();
        const container = document.getElementById("ordersList");
        
        let compiledHTML = "";

        if (!orders || orders.length === 0) {
            document.getElementById("activeOrderCount").innerText = "0 Active Orders";
            container.innerHTML = `
            <div class="no-orders">
                <i class="fas fa-shopping-bag"></i>
                <p>You haven't placed any orders yet!</p>
            </div>`;
            return;
        }

        document.getElementById("activeOrderCount").innerText = `${orders.length} Active Purchase${orders.length > 1 ? 's' : ''}`;

        // Retrieve historical tracking log to monitor for modifications
        let historicalStatusMap = JSON.parse(localStorage.getItem(`status_cache_${phone}`)) || {};
        let newStatusMap = {};

        orders.forEach(order => {
            let rawStatus = order.delivery_status ? order.delivery_status.toLowerCase() : "pending";
            let badgeClass = "badge-pending";
            let readableStatus = "Pending";
            let statusIndex = 0; 

            if (rawStatus === "preparing") {
                badgeClass = "badge-preparing";
                readableStatus = "Preparing";
                statusIndex = 1;
            } else if (rawStatus === "out_for_delivery" || rawStatus === "shipping") {
                badgeClass = "badge-delivery";
                readableStatus = "Out For Delivery";
                statusIndex = 2;
            } else if (rawStatus === "delivered") {
                badgeClass = "badge-delivered";
                readableStatus = "Delivered";
                statusIndex = 3;
            }

            // Log mapping status to local caches
            newStatusMap[order.id] = rawStatus;

            // Detect if status changed dynamically since last polling cycle!
            if (historicalStatusMap[order.id] && historicalStatusMap[order.id] !== rawStatus) {
                appendNotification(
                  "Order Status Shifted!",
                  `Your order for "${order.product_name || 'Item'}" has progressed to: ${readableStatus.toUpperCase()}`
                );
            }

            let productName = order.product_name || (order.product && order.product.name) || "Item Purchased";
            let productPrice = Number(order.amount || order.product_price || 0).toLocaleString();
            let deliveryLocation = order.delivery_location && order.delivery_location !== "null" ? order.delivery_location : "Not Specified";
            let paymentStatus = order.payment_status && order.payment_status !== "null" ? order.payment_status : "Pending";
            let sellerId = order.seller_id || "Direct CampusDuka";

            // Timestamp parsing
            let formattedDateTime = "Unrecorded";
            let timeSource = order.created_at || order.date;
            if (timeSource) {
                const parsedDate = new Date(timeSource);
                if (!isNaN(parsedDate)) {
                    formattedDateTime = parsedDate.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    }) + " at " + parsedDate.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            }

            let productImage = FALLBACK_IMAGE; 
            let databaseImage = cleanPostgresArray(order.product_images || order.image || (order.product && order.product.images));
            if (databaseImage && databaseImage !== "null" && databaseImage.trim() !== "") {
                productImage = databaseImage;
            }

            compiledHTML += `
            <div class="order-card">
                <div class="order-body">
                    <img src="${productImage}" class="order-img" alt="${productName}" onerror="this.onerror=null; this.src='${FALLBACK_IMAGE}';">
                    
                    <div class="order-details">
                        <div class="order-header">
                            <div>
                                <h2>${productName}</h2>
                                <div class="seller-id"><i class="fas fa-id-card"></i> Seller ID: ${sellerId}</div>
                            </div>
                            <div class="amount">KES ${productPrice}</div>
                        </div>
                        
                        <div style="margin-top: 10px;">
                            <span class="status-badge ${badgeClass}">
                              <i class="fas fa-circle" style="font-size: 8px;"></i> ${readableStatus}
                            </span>
                        </div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info"><i class="far fa-calendar-alt"></i> <span><strong>Placed:</strong> ${formattedDateTime}</span></div>
                    <div class="info"><i class="fas fa-map-marker-alt"></i> <span><strong>Location:</strong> ${deliveryLocation}</span></div>
                    <div class="info"><i class="far fa-credit-card"></i> <span><strong>Payment:</strong> ${paymentStatus}</span></div>
                </div>

                <!-- Live Status Timeline -->
                <div class="timeline">
                    <div class="step ${statusIndex >= 0 ? (statusIndex === 0 ? 'current' : 'active') : ''}">
                        <i class="fas fa-clock"></i> Pending
                    </div>
                    <div class="step ${statusIndex >= 1 ? (statusIndex === 1 ? 'current' : 'active') : ''}">
                        <i class="fas fa-cog"></i> Preparing
                    </div>
                    <div class="step ${statusIndex >= 2 ? (statusIndex === 2 ? 'current' : 'active') : ''}">
                        <i class="fas fa-shipping-fast"></i> Shipping
                    </div>
                    <div class="step ${statusIndex >= 3 ? (statusIndex === 3 ? 'current' : 'active') : ''}">
                        <i class="fas fa-check-circle"></i> Delivered
                    </div>
                </div>
            </div>`;
        });

        container.innerHTML = compiledHTML;
        
        // Save current statuses as base-state cache for future polling checks
        localStorage.setItem(`status_cache_${phone}`, JSON.stringify(newStatusMap));

    } catch(err) {
        console.error("Live fetch error sync failure:", err);
    }
}

window.onload = () => {
    // Sync initial notifications database from local storage
    const storedNotifs = localStorage.getItem(`buyer_notifs_${localStorage.getItem("buyerPhone")}`);
    if (storedNotifs) {
      buyerNotifications = JSON.parse(storedNotifs);
    }
    
    loadOrders();
    syncNotificationsUI();
    
    if(syncInterval) clearInterval(syncInterval);
    syncInterval = setInterval(loadOrders, 10000); 
};
</script>
</body>
</html>
