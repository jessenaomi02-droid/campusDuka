<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | CampusDuka</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: #f8fafc;
      color: #1f2d3d;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ---------- Navbar ---------- */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 5%;
      background: #1f2d3d; /* Brand Charcoal Base */
      border-bottom: 2px solid #164e63; /* Brand Slate Teal */
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .logo {
      color: white;
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo i {
      color: #4589be; /* Brand Accent Blue */
    }

    .logo span {
      color: #4589be;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #4589be;
      border-bottom-color: #4589be;
    }

    /* ---------- Main & Contact Section ---------- */
    .main-content {
      flex: 1;
      padding: 50px 20px;
      background: radial-gradient(circle at top, rgba(69, 137, 190, 0.08) 0%, transparent 70%);
    }

    .contact-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .contact-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .badge-tag {
      display: inline-block;
      background: rgba(22, 78, 99, 0.1);
      color: #164e63;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .contact-header h1 {
      color: #1f2d3d;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .contact-header p {
      color: #64748b;
      font-size: 16px;
    }

    .contact-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(31, 45, 61, 0.08);
      border: 1px solid #e2e8f0;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---------- Contact Info ---------- */
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
      justify-content: center;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .info-item i {
      font-size: 18px;
      color: #164e63;
      width: 48px;
      height: 48px;
      background: rgba(22, 78, 99, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .info-item span {
      font-size: 15px;
      color: #1f2d3d;
      font-weight: 500;
    }

    /* ---------- Contact Form ---------- */
    .contact-form form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 18px;
      color: #94a3b8;
      font-size: 15px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 13px 16px 13px 45px;
      border-radius: 10px;
      border: 1.5px solid #cbd5e1;
      font-size: 14px;
      outline: none;
      background: #f8fafc;
      color: #1f2d3d;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: #94a3b8;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      background: #ffffff;
      border-color: #164e63;
      box-shadow: 0 0 0 4px rgba(22, 78, 99, 0.15);
    }

    .contact-form textarea {
      resize: none;
      height: 130px;
      padding-top: 14px;
    }

    .contact-form button {
      background: #164e63; /* Brand Slate Teal */
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(22, 78, 99, 0.3);
    }

    .contact-form button:hover {
      background: #1f6b88;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(31, 107, 136, 0.35);
    }

    .contact-form button:active {
      transform: translateY(0);
    }

    /* ---------- Footer ---------- */
    footer {
      background: #1f2d3d;
      border-top: 1px solid #2d3f55;
      color: #94a3b8;
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 768px) {
      .contact-box {
        grid-template-columns: 1fr;
        padding: 25px;
      }

      .nav-links {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index2.html" class="logo">
      <i class="fa-solid fa-graduation-cap"></i> Campus<span>Duka</span>
    </a>
    <div class="nav-links">
      <a href="index2.html">Home</a>
      <a href="products.html">Products</a>
      <a href="events.html">Events</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <section class="contact-container">
      <div class="contact-header">
        <span class="badge-tag">Get In Touch</span>
        <h1>Contact Us</h1>
        <p>We’d love to hear from you. Reach out anytime.</p>
      </div>

      <div class="contact-box">
        <!-- Contact Info -->
        <div class="contact-info">
          <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>University Campus, Kenya</span>
          </div>

          <div class="info-item">
            <i class="fas fa-phone"></i>
            <span>+254 7XX XXX XXX</span>
          </div>

          <div class="info-item">
            <i class="fas fa-envelope"></i>
            <span>support@campusduka.com</span>
          </div>

          <div class="info-item">
            <i class="fas fa-clock"></i>
            <span>Mon – Sat | 8:00 AM – 6:00 PM</span>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
          <form id="contactForm" onsubmit="sendMessage(event)">
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" id="name" placeholder="Your Name" required>
            </div>

            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="email" placeholder="Your Email" required>
            </div>

            <div class="input-wrapper">
              <i class="fas fa-comment-dots"></i>
              <textarea id="message" placeholder="Your Message" required></textarea>
            </div>

            <button type="submit" id="submitBtn">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </div>

  <footer>
    &copy; 2026 CampusDuka. All Rights Reserved.
  </footer>

  <script>
    async function sendMessage(event) {
      event.preventDefault();

      const submitBtn = document.getElementById("submitBtn");
      const contactData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      submitBtn.innerText = "Sending...";
      submitBtn.disabled = true;

      try {
        const response = await fetch("https://campusduka-api.onrender.com/contact", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(contactData)
        });

        const data = await response.json();

        alert(data.message || "Message sent successfully! We'll get back to you soon.");
        document.getElementById("contactForm").reset();

      } catch (error) {
        console.error("Error sending message:", error);
        alert("Failed to send message. Please check your connection and try again.");
      } finally {
        submitBtn.innerText = "Send Message";
        submitBtn.disabled = false;
      }
    }
  </script>

</body>
</html>
