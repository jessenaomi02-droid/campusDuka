<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | CampusDuka</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    :root {
      --color-charcoal: #1f2d3d;      
      --color-slate-teal: #164e63;    
      --color-medium-teal: #1f6b88;   
      --color-accent-blue: #4589be;   
      
      --primary: #164e63;          /* Teal Primary */
      --primary-hover: #1f6b88;    /* Teal Hover */
      --secondary: #4589be;        /* Accent Blue */
      --bg: #f8fafc;               /* Slate Light Background */
      --card: #ffffff;
      --text-main: #1f2d3d;        /* Charcoal Text */
      --text-muted: #64748b;       /* Slate 500 */
      --border: #e2e8f0;           /* Slate 200 */
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      background: var(--color-charcoal);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--color-slate-teal);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* CHECKOUT LAYOUT */
    .checkout-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 32px;
      align-items: start;
    }

    /* CARD SYSTEM */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px -2px rgba(31, 45, 61, 0.06);
      padding: 32px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-slate-teal);
    }

    /* DYNAMIC ITEMIZATION */
    .summary-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 20px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f1f5f9;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-main);
    }

    .item-qty {
      font-size: 12px;
      color: var(--text-muted);
    }

    .item-price {
      font-weight: 700;
      font-size: 14px;
      color: var(--color-slate-teal);
    }

    /* PRICING SHEET */
    .price-sheet {
      border-top: 2px dashed var(--border);
      padding-top: 16px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sheet-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--text-muted);
    }

    .sheet-row.grand-total {
      font-size: 18px;
      font-weight: 800;
      color: var(--color-charcoal);
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }

    .sheet-row.grand-total span:last-child {
      color: var(--color-slate-teal);
    }

    /* FORM UTILITIES */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-charcoal);
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-slate-teal);
      font-size: 16px;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
      outline: none;
      background: #f8fafc;
      transition: all 0.2s ease;
    }

    textarea {
      resize: none;
      height: 90px;
      padding-left: 44px;
    }

    .textarea-icon {
      top: 22px !important;
      transform: none !important;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--color-slate-teal);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(22, 78, 99, 0.12);
    }

    /* PAYMENT BADGES */
    .payment-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 12px;
      padding: 14px;
      font-weight: 700;
      color: #166534;
      margin-bottom: 18px;
      font-size: 14px;
    }

    /* SUBMIT BUTTON */
    .pay-btn {
      width: 100%;
      background: var(--color-slate-teal);
      border: none;
      color: white;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(22, 78, 99, 0.25);
    }

    .pay-btn:hover {
      background: var(--color-medium-teal);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(22, 78, 99, 0.35);
    }

    .pay-btn:active {
      transform: translateY(1px);
    }

    .pay-btn:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* RESPONSIVE */
    @media(max-width: 868px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index2.html" class="logo">
      <svg height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="25" width="60" height="50" rx="8" fill="#164e63"/>
        <polygon points="50,15 20,25 80,25" fill="#ffffff"/>
        <circle cx="50" cy="50" r="10" fill="#ffffff"/>
      </svg>
      CampusDuka
    </a>
  </nav>

  <div class="checkout-container">
    <div class="checkout-grid">
      
      <!-- LEFT: DELIVERY FORM -->
      <div class="card">
        <h2 class="card-title">
          <i class="fa-solid fa-truck-fast"></i> Delivery Information
        </h2>
        <form id="checkoutForm">
          
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-user"></i>
              <input id="fullname" type="text" placeholder="e.g. Full Name" required>
            </div>
          </div>

          <div class="form-group">
            <label for="phone">M-Pesa Mobile Number</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-phone"></i>
              <input id="phone" type="tel" placeholder="e.g. 0712345678" required>
            </div>
          </div>

          <div class="form-group">
            <label for="location">Hostel Room & Delivery Location</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-map-pin textarea-icon"></i>
              <textarea id="location" placeholder="e.g. Maseno Main Campus, Hostels Block C, Room 4B" required></textarea>
            </div>
          </div>

          <div class="payment-indicator">
            <i class="fa-solid fa-circle-check"></i> Connected via Secured M-Pesa STK Push
          </div>

          <button type="submit" class="pay-btn">
            <i class="fa-solid fa-shield-halved"></i> Complete & Pay Now
          </button>
        </form>
      </div>

      <!-- RIGHT: CART SUMMARY -->
      <div class="card">
        <h2 class="card-title">
          <i class="fa-solid fa-basket-shopping"></i> Cart Summary
        </h2>
        
        <ul id="orderSummary" class="summary-list">
        </ul>

        <div class="price-sheet">
          <div class="sheet-row">
            <span>Items Subtotal</span>
            <span id="subtotalBox">KES 0.00</span>
          </div>
          <div class="sheet-row">
            <span>Campus Delivery (Maseno Area)</span>
            <span id="deliveryBox" style="font-weight: 700; color: var(--color-slate-teal);">KES 50.00</span>
          </div>
          <div class="sheet-row grand-total">
            <span>Total amount</span>
            <span id="totalAmount">KES 0.00</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // HELPER: CALCULATE APPLICABLE DELIVERY FEE
    function calculateDeliveryFee(regularCart, eventCart) {
      // If order contains physical products from regularCart, charge 50 delivery fee
      if (regularCart.length > 0) {
        return 50;
      }
      // If order contains ONLY event tickets, delivery fee is 0
      return 0;
    }

    // RENDER SHOPPING BASKET (PRODUCTS + EVENT TICKETS)
    document.addEventListener("DOMContentLoaded", () => {
      const regularCart = JSON.parse(localStorage.getItem("cart")) || [];
      const eventCart = JSON.parse(localStorage.getItem("eventCart")) || [];
      const combinedCart = [...regularCart, ...eventCart];

      const list = document.getElementById("orderSummary");
      const subtotalBox = document.getElementById("subtotalBox");
      const deliveryBox = document.getElementById("deliveryBox");
      const totalBox = document.getElementById("totalAmount");

      if (combinedCart.length === 0) {
        list.innerHTML = `
          <div style="text-align: center; padding: 32px 0; color: var(--text-muted);">
            <i class="fa-solid fa-basket-shopping" style="font-size: 36px; margin-bottom: 12px; display: block; color: var(--color-slate-teal);"></i>
            <p style="font-weight: 500;">Your shopping cart is empty 😢</p>
          </div>`;
        subtotalBox.textContent = "KES 0.00";
        deliveryBox.textContent = "KES 0.00";
        totalBox.textContent = "KES 0.00";
        return;
      }

      let subtotal = 0;
      list.innerHTML = "";

      combinedCart.forEach(item => {
        const itemQty = item.quantity || 1;
        const itemPrice = item.price || 0;
        const itemTotal = itemPrice * itemQty;
        subtotal += itemTotal;

        const li = document.createElement("li");
        li.className = "summary-item";
        li.innerHTML = `
          <div class="item-info">
            <span class="item-name">${item.name}</span>
            <span class="item-qty">Qty: ${itemQty} × ${itemPrice === 0 ? 'Free' : 'KES ' + itemPrice.toLocaleString()}</span>
          </div>
          <span class="item-price">${itemTotal === 0 ? 'Free' : 'KES ' + itemTotal.toLocaleString()}</span>
        `;
        list.appendChild(li);
      });

      const activeDeliveryFee = calculateDeliveryFee(regularCart, eventCart);
      const grandTotal = subtotal + activeDeliveryFee;

      subtotalBox.textContent = `KES ${subtotal.toLocaleString()}`;
      deliveryBox.textContent = activeDeliveryFee === 0 ? "Free (Ticket Only)" : `KES ${activeDeliveryFee.toLocaleString()}.00`;
      totalBox.textContent = `KES ${grandTotal.toLocaleString()}`;
    });

    // SECURED MPESA STK API DISPATCH
    document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payBtn = document.querySelector(".pay-btn");
      payBtn.disabled = true;
      payBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Triggering M-Pesa...`;

      const phone = document.getElementById("phone").value;
      const regularCart = JSON.parse(localStorage.getItem("cart")) || [];
      const eventCart = JSON.parse(localStorage.getItem("eventCart")) || [];
      const combinedCart = [...regularCart, ...eventCart];

      if (combinedCart.length === 0) {
        alert("Your cart is empty!");
        payBtn.disabled = false;
        payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> Complete & Pay Now`;
        return;
      }

      const activeDeliveryFee = calculateDeliveryFee(regularCart, eventCart);
      const subtotal = combinedCart.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 1)), 0);
      const grandTotal = subtotal + activeDeliveryFee;

      try {
        const mpesaResponse = await fetch("https://campusduka-api.onrender.com/stkpush", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fullname: document.getElementById("fullname").value,
            phone: phone.startsWith("0") ? "254" + phone.substring(1) : phone,
            location: document.getElementById("location").value,
            cart: combinedCart,
            amount: grandTotal
          })
        });

        const mpesaData = await mpesaResponse.json();
        console.log("M-Pesa STK Push Response: ", mpesaData);

        if (mpesaData.ResponseCode === "0") {
          localStorage.setItem("buyerPhone", phone.startsWith("0") ? "254" + phone.substring(1) : phone);
          localStorage.setItem("latestOrderId", mpesaData.orderId);

          window.location.href = "waiting-payment.html";
        } else {
          payBtn.disabled = false;
          payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> Complete & Pay Now`;
          alert("Failed to send M-Pesa push: " + (mpesaData.CustomerMessage || mpesaData.ResponseDescription || "Invalid parameters"));
        }
      } catch (err) {
        payBtn.disabled = false;
        payBtn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> Complete & Pay Now`;
        console.error("Payment connectivity crash:", err);
        alert("Could not connect to M-Pesa backend gateway. Please try again later.");
      }
    });
  </script>
</body>
</html>
