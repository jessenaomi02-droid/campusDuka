<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusDuka | Sign Up</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
font-family:Poppins,sans-serif;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#0a74da;
padding:15px 20px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.navdiv{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
color:white;
font-size:28px;
font-weight:bold;
text-decoration:none;
}

.navdiv ul{
display:flex;
list-style:none;
gap:20px;
padding:0;
margin:0;
}

.navdiv ul li a{
color:white;
text-decoration:none;
font-weight:500;
}

.navdiv ul li a:hover{
color:#dbeafe;
}

/* FORM */

.container{

width:350px;

background:white;

margin:60px auto;

padding:30px;

border-radius:15px;

box-shadow:
0 4px 15px rgba(
0,0,0,.1);

}

.container h2{

text-align:center;

color:#0a74da;

margin-bottom:20px;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

font-size:15px;

}

button{

width:100%;

padding:12px;

background:#0a74da;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

margin-top:10px;

}

button:hover{

background:#085cb4;

}

.login{

text-align:center;

margin-top:15px;

}

.login a{

color:#0a74da;

text-decoration:none;

font-weight:bold;

}

footer{

background:#0a74da;

color:white;

text-align:center;

padding:15px;

margin-top:50px;

}

@media(max-width:768px){

.navdiv{

flex-direction:column;
gap:10px;

}

.navdiv ul{

flex-wrap:wrap;
justify-content:center;

}

.container{

width:90%;

}

}

</style>

</head>

<body>


<nav class="navbar">

<div class="navdiv">

<a href="index2.html"
class="logo">

CampusDuka

</a>

<ul>

<li><a href="index2.html">Home</a></li>

<li><a href="products.html">Products</a></li>

<li><a href="food.html">Fast Foods</a></li>

<li><a href="events.html">Events</a></li>

<li><a href="contact.html">Contact</a></li>

</ul>

</div>

</nav>


<div class="container">

<h2>Create Account</h2>

<input
type="text"
id="fullname"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="text"
id="phone"
placeholder="Phone Number">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="signup()">

Create Account

</button>

<div class="login">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>


<footer>

© 2025 CampusDuka

</footer>


<script>

async function signup(){

const userData={

fullname:
document.getElementById(
"fullname"
).value,

email:
document.getElementById(
"email"
).value,

phone:
document.getElementById(
"phone"
).value,

password:
document.getElementById(
"password"
).value

};

const response=
await fetch(

"https://campusduka-api.onrender.com/signup",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify(
userData
)

}

);

const data=
await response.json();

alert(
data.message
);

}

</script>

</body>
</html>
