<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusDuka | Sign Up</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

* {
    box-sizing: border-box;
    transition: all 0.2s ease;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f0f4f8;
    color: #1a202c;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* NAVBAR */

.navbar {
    background: linear-gradient(135deg, #0a74da, #0852a3);
    padding: 15px 30px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 12px rgba(10, 116, 218, 0.2);
}

.navdiv {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
}

.logo {
    color: white;
    font-size: 26px;
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo span {
    color: #ffc107; /* Bright campus gold accent */
}

.navdiv ul {
    display: flex;
    list-style: none;
    gap: 22px;
    padding: 0;
    margin: 0;
}

.navdiv ul li a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
}

.navdiv ul li a:hover {
    color: #ffc107;
}

/* MAIN & CONTAINER */

.main-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 380px;
    background: white;
    padding: 35px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
}

.container h2 {
    text-align: center;
    color: #0a74da;
    margin: 0 0 25px 0;
    font-size: 24px;
    font-weight: 700;
}

.input-wrapper {
    position: relative;
    margin-bottom: 14px;
}

.input-wrapper .left-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0aec0;
}

/* Toggle eye button styling */
.toggle-password {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0aec0;
    cursor: pointer;
    user-select: none;
}

.toggle-password:hover {
    color: #0a74da;
}

input {
    width: 100%;
    padding: 12px 42px 12px 42px; /* Right padding ensures text doesn't overlap eye icon */
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    background: #f8fafc;
}

input:focus {
    background: #ffffff;
    border-color: #0a74da;
    box-shadow: 0 0 0 3px rgba(10, 116, 218, 0.15);
}

button.submit-btn {
    width: 100%;
    padding: 13px;
    background: #0a74da;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 4px 12px rgba(10, 116, 218, 0.3);
}

button.submit-btn:hover {
    background: #085cb4;
    transform: translateY(-1px);
}

button.submit-btn:active {
    transform: translateY(0);
}

.login {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #4a5568;
}

.login a {
    color: #0a74da;
    text-decoration: none;
    font-weight: 700;
}

.login a:hover {
    text-decoration: underline;
}

footer {
    background: #0852a3;
    color: rgba(255, 255, 255, 0.85);
    text-align: center;
    padding: 18px;
    font-size: 14px;
}

@media(max-width: 768px) {
    .navdiv {
        flex-direction: column;
        gap: 12px;
    }

    .navdiv ul {
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
    }
}

</style>
</head>

<body>

<nav class="navbar">
    <div class="navdiv">
        <a href="index2.html" class="logo">
            <i class="fa-solid fa-graduation-cap"></i> Campus<span>Duka</span>
        </a>
        <ul>
            <li><a href="index2.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="food.html">Fast Foods</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</nav>

<div class="main-content">
    <div class="container">
        <h2>Create Account</h2>

        <div class="input-wrapper">
            <i class="fa-solid fa-user left-icon"></i>
            <input type="text" id="fullname" placeholder="Full Name">
        </div>

        <div class="input-wrapper">
            <i class="fa-solid fa-envelope left-icon"></i>
            <input type="email" id="email" placeholder="Email">
        </div>

        <div class="input-wrapper">
            <i class="fa-solid fa-phone left-icon"></i>
            <input type="text" id="phone" placeholder="Phone Number">
        </div>

        <div class="input-wrapper">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="password" placeholder="Password">
            <i class="fa-solid fa-eye toggle-password" id="toggleEye" onclick="togglePasswordVisibility()"></i>
        </div>

        <button class="submit-btn" onclick="signup()">Create Account</button>

        <div class="login">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
</div>

<footer>
    © 2026 CampusDuka
</footer>

<script>

// Function to toggle password visibility
function togglePasswordVisibility() {
    const passwordInput = document.getElementById("password");
    const eyeIcon = document.getElementById("toggleEye");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }
}

async function signup(){

    const userData = {
        fullname: document.getElementById("fullname").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("https://campusduka-api.onrender.com/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(userData)
        });

        const data = await response.json();

        alert(data.message);

        // Redirect automatically if request was successful (HTTP status 200-299)
        if (response.ok) {
            window.location.href = "login.html";
        }
    } catch (error) {
        console.error("Error during signup:", error);
    }
}
</script>

</body>
</html>
