<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusDuka | Sign Up</title>

<!-- Fonts & Icons -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    background: #f8fafc;
    color: #1f2d3d;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* NAVBAR - Clean Brand Layout without Nav Links */

.navbar {
    position: sticky;
    top: 0;
    z-index: 1100;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px 5%;
    background: #1f2d3d; /* Brand Charcoal Base */
    border-bottom: 2px solid #164e63; /* Brand Slate Teal */
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.logo {
    color: white;
    font-size: 26px;
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo i {
    color: #4589be; /* Brand Accent Blue */
}

.logo span {
    color: #4589be;
}

/* MAIN CONTENT CONTAINER */

.main-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    background: radial-gradient(circle at top, rgba(69, 137, 190, 0.08) 0%, transparent 70%);
}

.container {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    padding: 40px 32px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(31, 45, 61, 0.08);
    border: 1px solid #e2e8f0;
    animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.badge-tag {
    text-align: center;
    margin-bottom: 8px;
}

.badge-tag span {
    background: rgba(22, 78, 99, 0.1);
    color: #164e63;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 20px;
}

.container h2 {
    text-align: center;
    color: #1f2d3d;
    margin: 0 0 25px 0;
    font-size: 26px;
    font-weight: 700;
}

.input-wrapper {
    position: relative;
    margin-bottom: 16px;
}

.input-wrapper .left-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 15px;
}

.toggle-password {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    cursor: pointer;
    user-select: none;
    font-size: 15px;
}

.toggle-password:hover {
    color: #4589be;
}

input {
    width: 100%;
    padding: 13px 45px 13px 45px;
    border: 1.5px solid #cbd5e1;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    background: #f8fafc;
    color: #1f2d3d;
}

input::placeholder {
    color: #94a3b8;
}

input:focus {
    background: #ffffff;
    border-color: #164e63;
    box-shadow: 0 0 0 4px rgba(22, 78, 99, 0.15);
}

button.submit-btn {
    width: 100%;
    padding: 14px;
    background: #164e63; /* Brand Slate Teal */
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 4px 14px rgba(22, 78, 99, 0.3);
}

button.submit-btn:hover {
    background: #1f6b88;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(31, 107, 136, 0.35);
}

button.submit-btn:active {
    transform: translateY(0);
}

.login {
    text-align: center;
    margin-top: 22px;
    font-size: 14px;
    color: #64748b;
}

.login a {
    color: #4589be;
    text-decoration: none;
    font-weight: 700;
}

.login a:hover {
    color: #164e63;
    text-decoration: underline;
}

footer {
    background: #1f2d3d;
    border-top: 1px solid #2d3f55;
    color: #94a3b8;
    text-align: center;
    padding: 20px;
    font-size: 14px;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<nav class="navbar">
    <a href="index2.html" class="logo">
        <i class="fa-solid fa-graduation-cap"></i> Campus<span>Duka</span>
    </a>
</nav>

<div class="main-content">
    <div class="container">
        <div class="badge-tag">
            <span>Join CampusDuka</span>
        </div>
        <h2>Create Account</h2>

        <div class="input-wrapper">
            <i class="fa-solid fa-user left-icon"></i>
            <input type="text" id="fullname" placeholder="Full Name">
        </div>

        <div class="input-wrapper">
            <i class="fa-solid fa-envelope left-icon"></i>
            <input type="email" id="email" placeholder="Email Address">
        </div>

        <div class="input-wrapper">
            <i class="fa-solid fa-phone left-icon"></i>
            <input type="text" id="phone" placeholder="Phone Number">
        </div>

        <div class="input-wrapper">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="password" placeholder="Password">
            <i class="fa-solid fa-eye toggle-password" id="toggleEye" onclick="togglePasswordVisibility()"></i>
        </div>

        <button class="submit-btn" onclick="signup()">Create Account</button>

        <div class="login">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
</div>

<footer>
    © 2026 CampusDuka. All rights reserved.
</footer>

<script>

// Function to toggle password visibility
function togglePasswordVisibility() {
    const passwordInput = document.getElementById("password");
    const eyeIcon = document.getElementById("toggleEye");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }
}

async function signup(){

    const userData = {
        fullname: document.getElementById("fullname").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch("https://campusduka-api.onrender.com/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(userData)
        });

        const data = await response.json();

        alert(data.message);

        // Redirect automatically if request was successful (HTTP status 200-299)
        if (response.ok) {
            window.location.href = "login.html";
        }
    } catch (error) {
        console.error("Error during signup:", error);
    }
}
</script>

</body>
</html>
