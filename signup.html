<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusDuka | Sign Up</title>

<!-- Google Fonts & FontAwesome -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

* {
    box-sizing: border-box;
    transition: all 0.2s ease-in-out;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f0f4f8;
    color: #333;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* NAVBAR */

.navbar {
    background: linear-gradient(135deg, #0a74da, #0652a2);
    padding: 15px 30px;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 12px rgba(10, 116, 218, 0.15);
}

.navdiv {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
}

.logo {
    color: white;
    font-size: 26px;
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo span {
    color: #ffcc00; /* CampusDuka Accent Gold */
}

.navdiv ul {
    display: flex;
    list-style: none;
    gap: 24px;
    padding: 0;
    margin: 0;
}

.navdiv ul li a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
}

.navdiv ul li a:hover {
    color: #ffcc00;
}

/* FORM CONTAINER */

.main-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 35px 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    border: 1px solid #e1e8ed;
}

.container .badge {
    background: #e6f0fa;
    color: #0a74da;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 10px;
}

.container h2 {
    text-align: center;
    color: #1a202c;
    margin: 0 0 20px 0;
    font-size: 24px;
    font-weight: 700;
}

.input-group {
    position: relative;
    margin-bottom: 15px;
}

.input-group i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0aec0;
}

input {
    width: 100%;
    padding: 12px 12px 12px 42px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
}

input:focus {
    border-color: #0a74da;
    box-shadow: 0 0 0 3px rgba(10, 116, 218, 0.15);
}

button {
    width: 100%;
    padding: 13px;
    background: #0a74da;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 4px 10px rgba(10, 116, 218, 0.3);
}

button:hover {
    background: #085cb4;
    transform: translateY(-1px);
}

button:active {
    transform: translateY(0);
}

.login {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #718096;
}

.login a {
    color: #0a74da;
    text-decoration: none;
    font-weight: 600;
}

.login a:hover {
    text-decoration: underline;
}

footer {
    background: #0652a2;
    color: rgba(255, 255, 255, 0.8);
    text-align: center;
    padding: 20px;
    font-size: 14px;
}

@media(max-width: 768px) {
    .navdiv {
        flex-direction: column;
        gap: 15px;
    }

    .navdiv ul {
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
    }
}

</style>
</head>

<body>

<nav class="navbar">
    <div class="navdiv">
        <a href="index2.html" class="logo">
            <i class="fa-solid fa-graduation-cap"></i> Campus<span>Duka</span>
        </a>
        <ul>
            <li><a href="index2.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="food.html">Fast Foods</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</nav>

<div class="main-content">
    <div class="container">
        <div style="text-align: center;">
            <span class="badge">Join CampusDuka</span>
        </div>
        <h2>Create Account</h2>

        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="fullname" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="phone" placeholder="Phone Number" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button onclick="signup()">Create Account</button>

        <div class="login">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
</div>

<footer>
    © 2026 CampusDuka. All rights reserved.
</footer>

<script>
async function signup() {
    const fullname = document.getElementById("fullname").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    if (!fullname || !email || !phone || !password) {
        alert("Please fill in all fields.");
        return;
    }

    const userData = { fullname, email, phone, password };

    try {
        const response = await fetch("https://campusduka-api.onrender.com/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(userData)
        });

        const data = await response.json();

        if (response.ok) {
            alert(data.message || "Signup successful! Redirecting to login page...");
            // Redirect to login page upon success
            window.location.href = "login.html";
        } else {
            alert(data.message || "Signup failed. Please try again.");
        }
    } catch (error) {
        console.error("Error during signup:", error);
        alert("Something went wrong. Please check your connection and try again.");
    }
}
</script>

</body>
</html>
