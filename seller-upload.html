<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>CampusDuka Seller Upload</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f7fb;
margin:0;
padding:30px;
}

.container{

max-width:600px;
margin:auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:
0 4px 15px rgba(0,0,0,.1);

}

h1{

text-align:center;
color:#0077ff;

}

input,
textarea,
select{

width:100%;
padding:12px;
margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

}

button{

width:100%;
padding:12px;

background:#0077ff;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#005ecb;

}

.note{

background:#eef5ff;

padding:10px;

border-radius:8px;

margin-bottom:20px;

}

</style>
</head>

<body>

<div class="container">

<h1>

Sell On CampusDuka

</h1>

<div class="note">

Your item will be reviewed by admin before appearing publicly.

</div>


<input
id="name"
placeholder="Product name">


<textarea
id="description"
placeholder="Description">
</textarea>


<input
id="price"
type="number"
placeholder="Price">


<select id="category">

<option>
Electronics
</option>

<option>
Clothes
</option>

<option>
Household Items
</option>

<option>
Food
</option>

<option>
Events
</option>

</select>


<h3>Image links</h3>

<input
id="image1"
placeholder="Image 1">

<input
id="image2"
placeholder="Image 2">

<input
id="image3"
placeholder="Image 3">

<input
id="image4"
placeholder="Image 4">


<h3>Or Upload Images</h3>

<input
type="file"
id="imageUpload"
multiple
accept="image/*">


<button
onclick="submitItem()">

Submit For Approval

</button>

</div>


<script>

async function submitItem(){

let uploadedFiles=

document
.getElementById(
"imageUpload"
)
.files;


let images=[

document.getElementById(
"image1"
).value,

document.getElementById(
"image2"
).value,

document.getElementById(
"image3"
).value,

document.getElementById(
"image4"
).value

].filter(
img=>img!=""
);


for(let file of uploadedFiles){

images.push(

URL.createObjectURL(file)

);

}


const product={

name:
document.getElementById(
"name"
).value,

description:
document.getElementById(
"description"
).value,

price:
document.getElementById(
"price"
).value,

images:images,

category:
document.getElementById(
"category"
).value,

status:
"pending"

};


const response=
await fetch(

"https://campusduka-api.onrender.com/add-product",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify(
product
)

}

);

const data=
await response.json();

alert(

"Submitted for approval"

);

}

</script>

</body>
</html>
