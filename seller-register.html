<!DOCTYPE html>
<html>
<head>
<title>Seller Register</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f7fb;
padding:30px;
}

.box{

max-width:400px;

margin:auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

input,
select,
button{

width:100%;

padding:12px;

margin:10px 0;

box-sizing:border-box;

}

button{

background:#0077ff;

color:white;

border:none;

border-radius:8px;

}

</style>
</head>

<body>

<div class="box">

<h2>

Seller Registration

</h2>

<input
id="name"
placeholder="Name">

<input
id="email"
placeholder="Email">
  
<input
id="phone"
placeholder="Phone Number">

<select id="sellerType">

<option value="student">
Student Seller
</option>

<option value="institution">
Institution / Business
</option>

</select>

<select id="businessModel">

<option value="subscription">
Monthly Listing Subscription
</option>

<option value="commission">
CampusDuka Sells On My Behalf (Commission)
</option>

</select>

<input
id="password"
type="password"
placeholder="Password">

<button onclick="createSellerAccount()">

Create Account

</button>
  <p>

Already have an account?

<a href="seller-login.html">

Login here

</a>

</p>

</div>

<script>

async function createSellerAccount(){

try{

const data={

name:
document.getElementById("name").value,

email:
document.getElementById("email").value,

phone:
document.getElementById("phone").value,

password:
document.getElementById("password").value,

seller_type:
document.getElementById("sellerType").value,

business_model:
document.getElementById("businessModel").value

};
const response=
await fetch(

"https://campusduka-api.onrender.com/seller-register",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

}

);

const result=
await response.json();

console.log(result);

alert(

result.message ||

result.error ||

"Unknown error"

);

}catch(error){

console.log(error);

alert("Something went wrong");

}

}

</script>



</body>
</html>
