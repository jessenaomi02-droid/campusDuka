<!DOCTYPE html>
<html>
<head>
<title>Seller Register</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f7fb;
padding:30px;
}

.box{

max-width:400px;

margin:auto;

background:white;

padding:25px;

border-radius:12px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

input,button{

width:100%;

padding:12px;

margin:10px 0;

}

button{

background:#0077ff;

color:white;

border:none;

border-radius:8px;

}

</style>
</head>

<body>

<div class="box">

<h2>

Seller Registration

</h2>

<input
id="name"
placeholder="Name">

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="register()">

Create Account

</button>

</div>


<script>

async function register(){

const data={

name:
document.getElementById(
"name"
).value,

email:
document.getElementById(
"email"
).value,

password:
document.getElementById(
"password"
).value

};

const response=
await fetch(

"https://campusduka-api.onrender.com/seller-register",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(data)

}

);

const result=
await response.json();

alert(
result.message
);

}

</script>

</body>
</html>
