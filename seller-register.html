<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Registration | CampusDuka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
/* ==========================
   MODERN UI STYLING & CORE
========================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f5f7fb;
  color: #1e293b;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
}

.box {
  width: 100%;
  max-width: 480px;
  background: white;
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
  border: 1px solid #e2e8f0;
}

.brand-header {
  text-align: center;
  margin-bottom: 25px;
}

.brand-header i {
  font-size: 32px;
  color: #0077ff;
  margin-bottom: 10px;
}

.brand-header h2 {
  font-size: 24px;
  font-weight: 700;
  color: #0077ff;
}

.brand-header p {
  font-size: 14px;
  color: #64748b;
  margin-top: 4px;
}

/* ================= FORM ARCHITECTURE ================= */
.form-group {
  margin-bottom: 16px;
  position: relative;
}

.form-group i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 12px 14px 12px 40px;
  background: #f8fafc;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  font-size: 14px;
  color: #1e293b;
  outline: none;
  transition: all 0.2s ease;
}

input:focus, select:focus {
  border-color: #0077ff;
  background: white;
  box-shadow: 0 0 0 4px rgba(0, 119, 255, 0.1);
}

/* ================= INTERACTIVE BUSINESS MATRIX ================= */
.model-descriptor {
  background: #f0f7ff;
  border-left: 4px solid #0077ff;
  padding: 12px 16px;
  border-radius: 0 10px 10px 0;
  margin: 12px 0;
  font-size: 13px;
  color: #1e3a8a;
  line-height: 1.5;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================= SUBMIT AND REDIRECTS ================= */
button {
  width: 100%;
  padding: 14px;
  background: #0077ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
}

button:hover {
  background: #005ecb;
  box-shadow: 0 4px 12px rgba(0, 119, 255, 0.25);
}

.box p.login-redirect {
  text-align: center;
  font-size: 14px;
  color: #64748b;
  margin-top: 20px;
}

.box p.login-redirect a {
  color: #0077ff;
  text-decoration: none;
  font-weight: 600;
}

.box p.login-redirect a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="box">
  <div class="brand-header">
    <i class="fas fa-store-lines"></i>
    <h2>Seller Registration</h2>
    <p>Launch your storefront in the student marketplace</p>
  </div>

  <!-- NAME -->
  <div class="form-group">
    <i class="fas fa-user"></i>
    <input id="name" type="text" placeholder="Full Name or Business Name">
  </div>

  <!-- EMAIL -->
  <div class="form-group">
    <i class="fas fa-envelope"></i>
    <input id="email" type="email" placeholder="Email Address">
  </div>
    
  <!-- PHONE NUMBER -->
  <div class="form-group">
    <i class="fas fa-phone"></i>
    <input id="phone" type="tel" placeholder="Phone Number (e.g., 07...)">
  </div>

  <!-- SELLER CLASSIFICATION TYPE -->
  <div class="form-group">
    <i class="fas fa-id-card"></i>
    <select id="sellerType">
      <option value="student">Student Seller (Campus Resident)</option>
      <option value="institution">Institution / External Business</option>
    </select>
  </div>

  <!-- BUSINESS OPERATIONAL MODEL MATRIX -->
  <div class="form-group">
    <i class="fas fa-briefcase"></i>
    <select id="businessModel" onchange="updateModelDescriptor()">
      <option value="subscription">Monthly Listing Subscription Plan</option>
      <option value="commission">CampusDuka Sells On My Behalf (Commission Plan)</option>
    </select>
  </div>

  <!-- DYNAMIC MATRIX DISCLOSURE BOX -->
  <div id="modelDescriptorBox" class="model-descriptor">
    <i class="fas fa-info-circle"></i> <strong>Subscription Tier:</strong> Pay a standardized flat rate of KES 1,500 every month. Keep 100% of your sales revenue. Ideal for high-volume merchants.
  </div>

  <!-- SECURE CREDENTIAL PASSWORD -->
  <div class="form-group">
    <i class="fas fa-lock"></i>
    <input id="password" type="password" placeholder="Create Password">
  </div>

  <!-- REGISTRATION SUBMIT TRIGGER -->
  <button onclick="createSellerAccount()">
    <i class="fas fa-user-plus"></i> Create Account
  </button>
  
  <p class="login-redirect">
    Already have a merchant account? <a href="seller-login.html">Login here</a>
  </p>
</div>

<script>
/* DYNAMICALLY DEFINE AND EXPLAIN BUSINESS OPERATION MODELS */
function updateModelDescriptor() {
  const selectedModel = document.getElementById("businessModel").value;
  const descriptorBox = document.getElementById("modelDescriptorBox");

  if (selectedModel === "subscription") {
    descriptorBox.innerHTML = `<i class="fas fa-info-circle"></i> <strong>Subscription Tier:</strong> Pay a standardized flat rate of KES 1,500 every month. Keep 100% of your sales revenue. Ideal for high-volume merchants.`;
    descriptorBox.style.borderColor = "#0077ff";
    descriptorBox.style.background = "#f0f7ff";
    descriptorBox.style.color = "#1e3a8a";
  } else if (selectedModel === "commission") {
    descriptorBox.innerHTML = `<i class="fas fa-hand-holding-dollar"></i> <strong>Commission Tier:</strong> No upfront or fixed monthly fees. CampusDuka manages order placement clearances and extracts a clean 10% operational cut from successful transactions only.`;
    descriptorBox.style.borderColor = "#10b981";
    descriptorBox.style.background = "#f0fdf4";
    descriptorBox.style.color = "#14532d";
  }
}

/* API ACCOUNT CREATION WORKSPACE PIPELINE */
async function createSellerAccount(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;
  const seller_type = document.getElementById("sellerType").value;
  const business_model = document.getElementById("businessModel").value;

  if (!name || !email || !phone || !password) {
    alert("Please fill out all credential registration input rows.");
    return;
  }

  try {
    const data = { name, email, phone, password, seller_type, business_model };
    
    const response = await fetch("https://campusduka-api.onrender.com/seller-register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    console.log(result);

    if (response.ok) {
      alert(result.message || "Account registered successfully! Redirecting to setup portal...");
      window.location.href = "seller-login.html";
    } else {
      alert(result.error || result.message || "Registration processing failure.");
    }

  } catch(error) {
    console.log(error);
    alert("Something went wrong connecting to the backend core system.");
  }
}
</script>

</body>
</html>
