<!DOCTYPE html>
<html>

<head>

<title>CampusDuka Admin</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{
font-family:Poppins,sans-serif;
margin:0;
background:#f5f7fb;
}

.navbar{
background:#0077ff;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:24px;
font-weight:bold;
}

.navbar ul{
display:flex;
gap:15px;
list-style:none;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}
  .stat-card{

background:white;

padding:25px;

border-radius:15px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.1);

transition:.3s;

}

.stat-card:hover{

transform:translateY(-5px);

}

.stat-card h3{

margin:0;

color:#666;

font-size:16px;

}

.stat-card p{

font-size:32px;

font-weight:bold;

color:#0077ff;

margin-top:10px;

}

</style>

</head>
<nav class="navbar">

<div class="logo">
CampusDuka Admin
</div>

<ul>

<li>
<a href="#dashboard">
Dashboard
</a>
</li>

<li>
<a href="#pending">
⏳ Pending Products
</a>
</li>

<li>
<a href="#approved">
✅ Approved Products
</a>
</li>

<li>
<a href="#sellers-section">
🏪 Sellers
</a>
</li>

<li>
<a href="#users-section">
👥 Users
</a>
</li>

</ul>

</nav>

<section id="dashboard">

<h1>
CampusDuka Dashboard
</h1>

<div class="stats">

<div class="stat-card">
<h3>Pending</h3>
<p id="pendingCount">0</p>
</div>

<div class="stat-card">
<h3>Approved</h3>
<p id="approvedCount">0</p>
</div>

<div class="stat-card">
<h3>Sellers</h3>
<p id="sellerCount">0</p>
</div>

<div class="stat-card">
<h3>Users</h3>
<p id="userCount">0</p>
</div>

</div>

</section>



<h1>

CampusDuka Admin

</h1>

<h2>

Pending Products

</h2>

<div id="pendingProducts">

</div>


<h2>

Approved Products

</h2>

<div id="products">

</div>
  


<script>

async function loadProducts(){

const response=
await fetch(
"https://campusduka-api.onrender.com/products"
);

const products=
await response.json();

const container=
document.getElementById(
"products"
);

container.innerHTML="";


products.forEach(product=>{

const image=

product.images &&
product.images.length

?

product.images[0]

:

"images/food1.jpg";


container.innerHTML+=`

<div class="item">

<img src="${image}">

<h3>

${product.name}

</h3>

<p>

KES ${product.price}

</p>

<p>

${product.category}

</p>
<p>

Seller:
${product.seller_name}

</p>

<p>

${product.seller_email}

</p>


<button
class="edit"

onclick="
editProduct(
${product.id},
'${product.name}',
'${product.description}',
'${product.price}'
)
">

Edit

</button>


<button
class="delete"

onclick="
deleteProduct(
${product.id}
)
">

Delete

</button>

</div>

`;

});

}
  
async function loadPendingProducts(){

const response=
await fetch(

"https://campusduka-api.onrender.com/pending-products"

);

const products=
await response.json();

console.log(products);

const container=
document.getElementById(
"pendingProducts"
);

container.innerHTML="";


products.forEach(product=>{

const image=

product.images &&
product.images.length

?

product.images[0]

:

"images/food1.jpg";


container.innerHTML+=`

<div class="item">

<img src="${image}">

<h3>
${product.name}
</h3>

<p>
KES ${product.price}
</p>

<p>
${product.category}
</p>
<p>

Seller:
${product.seller_name}

</p>

<p>

${product.seller_email}

</p>

<button
class="edit"
onclick="
approveProduct(
${product.id}
)
">

Approve

</button>


<button
class="delete"
onclick="
deleteProduct(
${product.id}
)
">

Delete

</button>

</div>

`;

});

}


async function deleteProduct(id){

if(
!confirm(
"Delete this item?"
)
)return;


const response=
await fetch(

`https://campusduka-api.onrender.com/delete-product/${id}`,

{
method:"DELETE"
}

);

const data=
await response.json();

alert(
data.message
);

loadProducts();

}

async function approveProduct(id){

const response=
await fetch(

`https://campusduka-api.onrender.com/approve-product/${id}`,

{
method:"PUT"
}

);
  

const data=
await response.json();

alert(
data.message
);

loadPendingProducts();

loadProducts();

}

async function editProduct(
id,
oldName,
oldDescription,
oldPrice
){

const name=
prompt(
"Edit name",
oldName
);

if(!name)return;


const description=
prompt(
"Edit description",
oldDescription
);

if(!description)return;


const price=
prompt(
"Edit price",
oldPrice
);

if(!price)return;


const response=
await fetch(

`https://campusduka-api.onrender.com/edit-product/${id}`,

{

method:"PUT",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

name,
description,
price

})

}

);

const data=
await response.json();

alert(
data.message
);

loadProducts();

}

async function loadStats(){

try{

const pendingResponse=
await fetch(
"https://campusduka-api.onrender.com/pending-products"
);

const pending=
await pendingResponse.json();

document.getElementById(
"pendingCount"
).innerText=
pending.length;


const approvedResponse=
await fetch(
"https://campusduka-api.onrender.com/products"
);

const approved=
await approvedResponse.json();

document.getElementById(
"approvedCount"
).innerText=
approved.length;


const sellersResponse=
await fetch(
"https://campusduka-api.onrender.com/all-sellers"
);

const sellers=
await sellersResponse.json();

document.getElementById(
"sellerCount"
).innerText=
sellers.length;

}catch(err){

console.log(err);

}

}
loadProducts();

loadPendingProducts();

loadStats();
</script>
