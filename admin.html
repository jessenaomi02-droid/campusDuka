<!DOCTYPE html>
<html>
<head>

<title>CampusDuka Admin</title>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{

font-family:Poppins,sans-serif;
padding:30px;
background:#f5f7fb;

}

h1{

color:#0077ff;
text-align:center;

}

#products{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:30px;

}

.item{

background:white;

padding:15px;

border-radius:10px;

box-shadow:
0 2px 8px rgba(0,0,0,.1);

text-align:center;

}

img{

width:100%;
height:180px;

object-fit:cover;

border-radius:8px;

}

h3{

margin:10px 0;

}

button{

border:none;

padding:10px 15px;

margin:5px;

border-radius:6px;

cursor:pointer;

color:white;

}

.edit{

background:#0077ff;

}

.delete{

background:red;

}

</style>

</head>

<body>

<h1>

CampusDuka Admin

</h1>

<h2>

Pending Products

</h2>

<div id="pendingProducts">

</div>


<h2>

Approved Products

</h2>

<div id="products">

</div>


<script>

async function loadProducts(){

const response=
await fetch(
"https://campusduka-api.onrender.com/products"
);

const products=
await response.json();

const container=
document.getElementById(
"products"
);

container.innerHTML="";


products.forEach(product=>{

const image=

product.images &&
product.images.length

?

product.images[0]

:

"images/food1.jpg";


container.innerHTML+=`

<div class="item">

<img src="${image}">

<h3>

${product.name}

</h3>

<p>

KES ${product.price}

</p>

<p>

${product.category}

</p>


<button
class="edit"

onclick="
editProduct(
${product.id},
'${product.name}',
'${product.description}',
'${product.price}'
)
">

Edit

</button>


<button
class="delete"

onclick="
deleteProduct(
${product.id}
)
">

Delete

</button>

</div>

`;

});

}



async function deleteProduct(id){

if(
!confirm(
"Delete this item?"
)
)return;


const response=
await fetch(

`https://campusduka-api.onrender.com/delete-product/${id}`,

{
method:"DELETE"
}

);

const data=
await response.json();

alert(
data.message
);

loadProducts();

}



async function editProduct(
id,
oldName,
oldDescription,
oldPrice
){

const name=
prompt(
"Edit name",
oldName
);

if(!name)return;


const description=
prompt(
"Edit description",
oldDescription
);

if(!description)return;


const price=
prompt(
"Edit price",
oldPrice
);

if(!price)return;


const response=
await fetch(

`https://campusduka-api.onrender.com/edit-product/${id}`,

{

method:"PUT",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

name,
description,
price

})

}

);

const data=
await response.json();

alert(
data.message
);

loadProducts();

}


loadProducts();

</script>

</body>

</html>
