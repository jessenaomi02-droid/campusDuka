<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusDuka | Login</title>

<style>

body{
font-family:Poppins,sans-serif;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#0a74da;
padding:15px 20px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.navdiv{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
color:white;
font-size:28px;
font-weight:bold;
text-decoration:none;
}

.navdiv ul{
display:flex;
list-style:none;
gap:20px;
margin:0;
padding:0;
}

.navdiv ul li a{
color:white;
text-decoration:none;
}

/* LOGIN BOX */

.container{

width:350px;
background:white;

margin:60px auto;

padding:30px;

border-radius:15px;

box-shadow:
0 4px 15px rgba(
0,0,0,.1);

}

h2{

text-align:center;
color:#0a74da;

}

input{

width:100%;
padding:12px;

margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

}

button{

width:100%;
padding:12px;

background:#0a74da;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

button:hover{

background:#085cb4;

}

.signup{

text-align:center;
margin-top:15px;

}

.signup a{

color:#0a74da;
font-weight:bold;
text-decoration:none;

}

footer{

background:#0a74da;
color:white;
text-align:center;
padding:15px;
margin-top:80px;

}

</style>
</head>

<body>

<nav class="navbar">

<div class="navdiv">

<a href="index2.html"
class="logo">

CampusDuka

</a>

<ul>

<li><a href="index2.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="food.html">Fast Foods</a></li>
<li><a href="events.html">Events</a></li>

</ul>

</div>

</nav>


<div class="container">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>


<div class="signup">

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</div>

</div>


<footer>

© 2025 CampusDuka

</footer>


<script>

async function login(){

const userData={

email:
document.getElementById(
"email"
).value,

password:
document.getElementById(
"password"
).value

};

const response=
await fetch(

"https://campusduka-api.onrender.com/login",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify(
userData
)

}

);

const data=
await response.json();

alert(
data.message
);

if(data.success){

localStorage.setItem(
"user",
JSON.stringify(
data.user
)
);

window.location=
"index2.html";

}

}

</script>

</body>
</html>
