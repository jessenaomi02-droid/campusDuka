<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusDuka | All Products</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--primary:#0077ff;
}

body{
margin:0;
font-family:Poppins,sans-serif;
background:#f5f7fb;
}

*{
box-sizing:border-box;
}

.navbar{
background:var(--primary);
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
position:sticky;
top:0;
z-index:1000;
}

.logo a{
color:white;
font-size:22px;
font-weight:bold;
text-decoration:none;
}

.nav-links{
display:flex;
gap:20px;
list-style:none;
padding:0;
margin:0;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:600;
}

.cart-link{
position:relative;
color:white;
font-size:20px;
}

#cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
}

.menu-icon{
display:none;
color:white;
font-size:24px;
cursor:pointer;
}

.search-section{
text-align:center;
margin:30px 0;
}

.search-box{
display:flex;
justify-content:center;
gap:8px;
}

.search-box input{
width:60%;
max-width:400px;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

.search-box button{
background:var(--primary);
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
}

.products-container{
padding:30px 5%;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product-card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.product-card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:8px;
}

.product-card p{
color:var(--primary);
font-weight:bold;
}

.product-card small{
display:block;
color:#666;
margin-top:6px;
}

.bn{
background:var(--primary);
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
margin:4px;
cursor:pointer;
}

/* modal */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:550px;
border-radius:10px;
position:relative;
text-align:center;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

#mainImage{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}

.thumbnail-container{
margin-top:10px;
}

.thumbnail-container img{
width:70px;
height:70px;
margin:4px;
cursor:pointer;
border-radius:8px;
border:2px solid transparent;
}

.thumbnail-container img:hover{
border-color:var(--primary);
}

footer{
background:var(--primary);
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

@media(max-width:768px){

.menu-icon{
display:block;
}

.nav-links{
display:none;
position:absolute;
top:60px;
left:0;
width:100%;
background:var(--primary);
flex-direction:column;
text-align:center;
padding:20px 0;
}

.nav-links.active{
display:flex;
}

}

</style>
</head>

<body>

<nav class="navbar">

<div class="logo">
<a href="index2.html">
CampusDuka
</a>
</div>

<div class="menu-icon" id="menuIcon">
<i class="fas fa-bars"></i>
</div>

<ul class="nav-links" id="navLinks">

<li><a href="index2.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="food.html">Fast Foods</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

<a href="cart.html" class="cart-link">

<i class="fas fa-shopping-cart"></i>

<span id="cart-count">
0
</span>

</a>

</nav>


<section class="search-section">

<h2>
All Products
</h2>

<div class="search-box">

<input
placeholder="Search products...">

<button>
Search
</button>

</div>

</section>


<div
class="products-container"
id="product-container">

</div>


<div
class="modal"
id="viewModal">

<div
class="modal-content">

<span
class="close-btn"
onclick="closeModal()">

&times;

</span>

<img id="mainImage">

<div
class="thumbnail-container"
id="thumbnails">

</div>

</div>

</div>


<footer>

© 2025 CampusDuka

</footer>


<script>

/* mobile menu */

menuIcon.onclick=()=>{

navLinks.classList.toggle(
"active"
);

};


/* cart */

function updateCartCount(){

let cart=
JSON.parse(
localStorage.getItem(
'cart'
)
)||[];

let count=
cart.reduce(
(s,i)=>s+i.quantity,
0
);

document
.getElementById(
"cart-count"
)
.innerText=count;

}


function addToCart(
name,
price,
image
){

let cart=
JSON.parse(
localStorage.getItem(
'cart'
)
)||[];

let item=
cart.find(
p=>p.name===name
);

if(item){

item.quantity++;

}else{

cart.push({
name,
price,
image,
quantity:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCartCount();

alert(
name+
" added to cart"
);

}


/* view images */

function viewProduct(images){

const modal=
document.getElementById(
"viewModal"
);

const main=
document.getElementById(
"mainImage"
);

const thumbs=
document.getElementById(
"thumbnails"
);

main.src=
images[0];

thumbs.innerHTML="";

images.forEach(img=>{

if(img){

let t=
document.createElement(
"img"
);

t.src=img;

t.onclick=()=>{

main.src=img;

};

thumbs.appendChild(t);

}

});

modal.style.display=
"flex";

}


function closeModal(){

document
.getElementById(
"viewModal"
)
.style.display="none";

}


/* load database products */

async function loadProducts(){

const response=
await fetch(
"https://campusduka-api.onrender.com/products"
);

const products=
await response.json();

const container=
document.getElementById(
"product-container"
);

container.innerHTML="";

products.forEach(product=>{

const imgs=
product.images ||
[
product.image
] ||
[];
const firstImage=
const firstImage=
imgs[0] ||
"/images/food1.jpg";
container.innerHTML+=`

<div class="product-card">

<img src="${firstImage}">

<h3>
${product.name}
</h3>

<p>
KES ${product.price}
</p>

<small>
${product.description}
</small>

<br><br>

<button
class="bn"
onclick='viewProduct(${JSON.stringify(imgs)})'>

View

</button>

<button
class="bn"

onclick="addToCart(
'${product.name}',
${product.price},
'${firstImage}'
)">

Add To Cart

</button>

</div>

`;

});

}

document.addEventListener(
"DOMContentLoaded",
()=>{

updateCartCount();

loadProducts();

}
);

</script>

</body>
</html>
