<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusDuka | Fast Foods</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
/* ==========================================
   COLOR SYSTEM & VARIABLES (Your Brand Palette)
   ========================================== */
:root {
  --color-charcoal: #1f2d3d;      /* Base darks, navbars, footers */
  --color-slate-teal: #164e63;    /* Main brand color, borders, primary elements */
  --color-medium-teal: #1f6b88;   /* Primary hover states */
  --color-accent-blue: #4589be;   /* Nav hover active borders, subtle glow */

  --color-bg-main: #f8fafc;       /* Light page background */
  --color-card-white: #ffffff;    /* Cards, clean containers */
  --color-slate-light: #f1f5f9;   /* Secondary buttons, category tags */
  --color-border-light: #e2e8f0;  /* Clean card & section borders */
  --color-text-dark: #1f2d3d;     /* Main readable text */
  --color-text-muted: #64748b;    /* Description text, subheaders */
  --color-text-light: #94a3b8;    /* Placeholders, footer text */

  --color-success: #10b981;       /* Order / CTA buttons */
  --color-success-hover: #059669; /* Success hover */
  --color-danger: #ef4444;        /* Alerts, urgency badges, cart count */
  --color-danger-dark: #dc2626;   /* Danger hover, alert text */
  --color-rose-badge: #e11d48;    /* Ad badges */
  --color-pink-bg: #fff5f5;       /* Warning/countdown backgrounds */
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body{
  background: var(--color-bg-main);
  color: var(--color-text-dark);
}

/* ================= NAVBAR ================= */
.navbar{
  background: var(--color-charcoal);
  padding: 12px 5%;
  position: sticky;
  top: 0;
  z-index: 1100;
  border-bottom: 2px solid var(--color-slate-teal);
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.navdiv{
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-link {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  background: transparent;
}

.logo-svg {
  height: 40px;
  width: auto;
}

.logo-text {
  color: #ffffff;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo-text span {
  color: var(--color-accent-blue);
}

.navdiv ul{
  display: flex;
  list-style: none;
  gap: 20px;
  align-items: center;
}

.navdiv ul li a{
  text-decoration: none;
  color: rgba(255, 255, 255, 0.85);
  font-weight: 500;
  font-size: 14px;
  padding: 6px 12px;
  border-bottom: 2px solid transparent;
}

.navdiv ul li a:hover, .navdiv ul li a.active {
  color: var(--color-accent-blue);
  border-bottom: 2px solid var(--color-accent-blue);
}

.cart-link{
  color: white;
  font-size: 22px;
  position: relative;
  display: flex;
  align-items: center;
  margin-left: 10px;
}

.cart-link:hover {
  color: var(--color-accent-blue);
}

#cart-count{
  background: var(--color-danger);
  color: white;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  font-weight: 700;
  position: absolute;
  top: -8px;
  right: -10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ================= SEARCH ================= */
.navbar-search{
  background: var(--color-charcoal);
  padding: 16px 20px;
  display: flex;
  justify-content: center;
}

.navbar-search-box {
  width: 100%;
  max-width: 500px;
  display: flex;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.navbar-search input{
  flex: 1;
  padding: 12px 16px;
  border: 1px solid #2d3f55;
  border-radius: 8px 0 0 8px;
  outline: none;
  font-size: 14px;
  background: #2d3f55;
  color: white;
}

.navbar-search input::placeholder {
  color: var(--color-text-light);
}

.navbar-search button{
  background: var(--color-slate-teal);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
  font-weight: 600;
}

.navbar-search button:hover {
  background: var(--color-medium-teal);
}

/* ================= HERO SLIDER ================= */
.hero{
  position: relative;
  width: 100%;
  height: 380px;
  overflow: hidden;
}

.slider{
  position: absolute;
  width: 100%;
  height: 100%;
}

.slide{
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 2s ease-in-out;
}

.slide.active{
  opacity: 1;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(rgba(31, 45, 61, 0.75), rgba(31, 45, 61, 0.9));
  z-index: 1;
}

.hero-text{
  position: relative;
  z-index: 2;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

.hero-text h1 {
  font-size: 40px;
  font-weight: 800;
  margin-bottom: 12px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
}

.hero-text h1 span {
  color: var(--color-accent-blue);
}

.hero-text p {
  font-size: 18px;
  opacity: 0.9;
  color: #e2e8f0;
}

/* ================= PRODUCTS GRID ================= */
.product-container{
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
  padding: 50px 20px;
}

.product-card{
  background: var(--color-card-white);
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.02);
  overflow: hidden;
  border: 1px solid var(--color-border-light);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 22px rgba(31, 45, 61, 0.08);
}

.img-wrapper {
  position: relative;
  width: 100%;
  height: 200px;
  overflow: hidden;
}

.product-card img{
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.delivery-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--color-slate-teal);
  color: white;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  border-radius: 6px;
  text-transform: uppercase;
}

.rating-badge {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(31, 45, 61, 0.9);
  color: #fbbf24;
  padding: 4px 8px;
  font-size: 12px;
  font-weight: 700;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-details {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.card-details-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.product-card h3{
  font-size: 16px;
  font-weight: 600;
  color: var(--color-text-dark);
}

.product-card p{
  color: var(--color-slate-teal);
  font-weight: 700;
  font-size: 18px;
}

.product-card small{
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--color-text-muted);
  font-size: 13px;
  line-height: 1.5;
  height: 38px;
  margin-bottom: 15px;
}

.countdown-box {
  background: var(--color-pink-bg);
  border: 1px dashed var(--color-danger);
  padding: 8px;
  border-radius: 8px;
  font-size: 11px;
  color: var(--color-danger-dark);
  font-weight: 600;
  text-align: center;
  margin-bottom: 15px;
}

.card-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: auto;
}

.bn{
  padding: 11px 14px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.bn-view {
  background: var(--color-slate-light);
  color: var(--color-text-dark);
  border: 1px solid var(--color-border-light);
}

.bn-view:hover {
  background: var(--color-border-light);
}

.bn-add {
  background: var(--color-success);
  color: white;
}

.bn-add:hover {
  background: var(--color-success-hover);
}

/* ================= MODAL ================= */
.modal{
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(4px);
  justify-content: center;
  align-items: center;
  z-index: 1500;
  padding: 20px;
}

.modal-content{
  background: white;
  padding: 25px;
  border-radius: 16px;
  width: 95%;
  max-width: 500px;
  position: relative;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
  border: 1px solid var(--color-border-light);
}

.close-btn{
  position: absolute;
  right: 18px;
  top: 12px;
  font-size: 28px;
  cursor: pointer;
  color: var(--color-text-light);
}

.close-btn:hover {
  color: var(--color-text-dark);
}

#mainImage{
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 12px;
}

.thumbnail-container{
  margin-top: 12px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.thumbnail-container img{
  width: 65px;
  height: 65px;
  border-radius: 8px;
  cursor: pointer;
  object-fit: cover;
  border: 2px solid transparent;
}

.thumbnail-container img:hover {
  border-color: var(--color-slate-teal);
}

/* ================= FOOTER ================= */
footer{
  background: var(--color-charcoal);
  color: white;
  padding: 35px 20px;
  text-align: center;
  font-size: 14px;
  border-top: 3px solid var(--color-slate-teal);
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 768px) {
  .navdiv ul {
    gap: 8px;
  }
  .navdiv ul li a {
    padding: 5px 10px;
    font-size: 13px;
  }
  .hero-text h1 {
    font-size: 32px;
  }
  .hero-text p {
    font-size: 15px;
  }
}

@media (max-width: 550px) {
  .navdiv {
    flex-direction: column;
    gap: 15px;
    text-align: center;
  }
  .navbar-search-box {
    width: 100%;
  }
  .product-container {
    grid-template-columns: 1fr;
    padding: 20px;
  }
}
</style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <div class="navdiv">
    <a href="index2.html" class="logo-link">
      <!-- Inline SVG CampusDuka Logo -->
      <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#164e63" />
            <stop offset="100%" stop-color="#4589be" />
          </linearGradient>
        </defs>
        <rect x="20" y="25" width="60" height="50" rx="8" fill="url(#logo-grad)" />
        <polygon points="50,15 20,25 80,25" fill="#ffffff" />
        <circle cx="50" cy="50" r="10" fill="#ffffff" />
        <path d="M44,50 L56,50 M50,44 L50,56" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" />
      </svg>
      <span class="logo-text">Campus<span>Duka</span></span>
    </a>
    <ul>
      <li><a href="index2.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="food.html" class="active">Fast Foods</a></li>
      <li><a href="events.html">Events</a></li>
    </ul>
    <a href="cart.html" class="cart-link">
      <i class="fas fa-shopping-cart"></i>
      <span id="cart-count">0</span>
    </a>
  </div>
</nav>

<!-- ================= SEARCH ================= -->
<div class="navbar-search">
  <div class="navbar-search-box">
    <input id="foodSearchInput" placeholder="Search delicious food items..." onkeyup="searchFoodItems()">
    <button onclick="searchFoodItems()">
      <i class="fa fa-search"></i> Search
    </button>
  </div>
</div>

<!-- ================= HERO SLIDER ================= -->
<section class="hero">
  <div class="slider">
    <img class="slide active" src="images/food1.jpg" alt="Slide 1">
    <img class="slide" src="images/food2.jpg" alt="Slide 2">
    <img class="slide" src="images/food3.jpg" alt="Slide 3">
    <img class="slide" src="images/food4.jpg" alt="Slide 4">
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <h1>Smart Buying, <span>Delicious Eating</span></h1>
    <p>Warm & fresh campus favorites prepared and delivered instantly</p>
  </div>
</section>

<!-- ================= DYNAMIC PRODUCT GRID ================= -->
<div class="product-container" id="product-container"></div>

<!-- ================= EXPANSION VIEW MODAL ================= -->
<div class="modal" id="viewModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="mainImage" alt="Main View">
    <div id="thumbnails" class="thumbnail-container"></div>
  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer>
  &copy; 2026 CampusDuka • All Rights Reserved
</footer>

<!-- ================= SYSTEM SCRIPTS ================= -->
<script>
/* HERO SLIDER ENGINE */
let slides = document.querySelectorAll(".slide");
let current = 0;

setInterval(() => {
  if (slides.length > 0) {
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
  }
}, 6000);

/* CART SYNCHRONIZATION ENGINE */
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let count = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cart-count').innerText = count;
}

function addToCart(name, price, image){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let existing = cart.find(item => item.name === name);

  if(existing){
    existing.quantity++;
  } else {
    cart.push({ name, price, image, quantity: 1 });
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  alert(name + " added to your cart!");
}

/* PRODUCT PREVIEW ENGINE */
function viewProduct(images){
  const modal = document.getElementById("viewModal");
  const main = document.getElementById("mainImage");
  const thumbs = document.getElementById("thumbnails");
  
  main.src = images[0];
  thumbs.innerHTML = "";

  images.forEach(img => {
    let t = document.createElement("img");
    t.src = img;
    t.onclick = () => { main.src = img; };
    thumbs.appendChild(t);
  });

  modal.style.display = "flex";
}

function closeModal(){
  document.getElementById("viewModal").style.display = "none";
}

/* CARDS RENDER TEMPLATE ENGINE (Redesigned for Premium Layout) */
function buildFoodCardMarkup(product) {
  const imgs = product.images && product.images.length ? product.images : ["images/food1.jpg"];
  const first = imgs[0];
  
  return `
    <div class="product-card">
      <div class="img-wrapper">
        <span class="delivery-badge">⚡ Fresh Delivery</span>
        <span class="rating-badge"><i class="fa-solid fa-star"></i> 4.8</span>
        <img src="${first}" alt="${product.name}" loading="lazy">
      </div>
      <div class="card-details">
        <div class="card-details-header">
          <h3>${product.name}</h3>
        </div>
        <p>KES ${product.price}</p>
        <small>${product.description || 'Tasty and freshly-made campus favorite.'}</small>
        <div class="countdown-box">
          <i class="fa-solid fa-clock"></i> Delivery in: 15-25 mins
        </div>
        <div class="card-actions">
          <button class="bn bn-view" onclick='viewProduct(${JSON.stringify(imgs)})'>
            <i class="fa-solid fa-eye"></i> View
          </button>
          <button class="bn bn-add" onclick="addToCart('${product.name.replace(/'/g, "\\'")}', ${product.price}, '${first}')">
            <i class="fa-solid fa-cart-plus"></i> Order
          </button>
        </div>
      </div>
    </div>
  `;
}

/* LIVE FILTER ENGINE */
let fetchedFoodDataset = [];

function searchFoodItems() {
  const inputVal = document.getElementById("foodSearchInput").value.toLowerCase();
  const filtered = fetchedFoodDataset.filter(item => 
    item.name.toLowerCase().includes(inputVal) || 
    (item.description && item.description.toLowerCase().includes(inputVal))
  );
  
  const container = document.getElementById("product-container");
  container.innerHTML = "";
  filtered.forEach(product => {
    container.innerHTML += buildFoodCardMarkup(product);
  });
}

/* LOAD PRODUCTS FROM API */
async function loadProducts(){
  try {
    const response = await fetch("https://campusduka-api.onrender.com/products");
    const products = await response.json();
    
    // Filtering strictly target category assignment context 
    fetchedFoodDataset = products.filter(product => product.category === "Food");
    
    const container = document.getElementById("product-container");
    container.innerHTML = "";
    
    fetchedFoodDataset.forEach(product => {
      container.innerHTML += buildFoodCardMarkup(product);
    });
  } catch (error) {
    console.error("Error connecting to data layer:", error);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  updateCartCount();
  loadProducts();
});
</script>

</body>
</html>
