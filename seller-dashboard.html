<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusDuka Seller Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

.header{
background:linear-gradient(135deg,#0077ff,#005fcc);
padding:30px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.header h1{
font-size:32px;
}

.header p{
margin-top:8px;
opacity:.9;
}

.actions{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:20px;
}

button{
cursor:pointer;
border:none;
border-radius:12px;
padding:13px 20px;
font-weight:600;
transition:.3s;
}

.upload-btn{
background:white;
color:#0077ff;
}

.upload-btn:hover{
transform:translateY(-3px);
}

.logout-btn{
background:#ff4d4d;
color:white;
}

.logout-btn:hover{
background:#e60000;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.subscription-card{

background:white;

border-radius:20px;

padding:25px;

box-shadow:0 6px 20px rgba(0,0,0,.08);

margin-bottom:30px;

}

.subscription-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

flex-wrap:wrap;

}

.subscription-title h2{

color:#0077ff;

}

.plan-badge{

padding:10px 18px;

border-radius:30px;

font-weight:bold;

color:white;

font-size:15px;

}

.free{
background:#666;
}

.copper{
background:#cd7f32;
}

.bronze{
background:#b87333;
}

.gold{
background:#f4b400;
color:#222;
}

.info-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:20px;

}

.info-box{

background:#f8fbff;

padding:18px;

border-radius:15px;

}

.info-box h3{

font-size:15px;

color:#555;

margin-bottom:8px;

}

.info-box p{

font-size:22px;

font-weight:bold;

}

.progress{

height:14px;

background:#e5e5e5;

border-radius:30px;

overflow:hidden;

margin-top:15px;

}

.progress-bar{

height:100%;

width:0%;

background:#0077ff;

transition:.4s;

}

#products{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

margin-top:30px;

}

.product{

background:white;

border-radius:18px;

overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.08);

transition:.3s;

}

.product:hover{

transform:translateY(-6px);

}

.product img{

width:100%;

height:220px;

object-fit:cover;

}

.product-body{

padding:20px;

}

.price{

color:#0077ff;

font-size:24px;

font-weight:bold;

margin:12px 0;

}

.category{

display:inline-block;

background:#eaf2ff;

color:#0077ff;

padding:6px 12px;

border-radius:20px;

font-size:13px;

margin-bottom:15px;

}

.status{

padding:8px 14px;

border-radius:30px;

display:inline-block;

font-weight:bold;

margin-top:15px;

color:white;

}

.pending{

background:orange;

}

.approved{

background:green;

}

.rejected{

background:red;

}

.empty{

background:white;

padding:50px;

text-align:center;

border-radius:18px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

}

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>CampusDuka Seller Dashboard</h1>

<p>

Welcome back,

<b id="sellerName"></b>

🚀

</p>

</div>

<div class="actions">

<button class="upload-btn" onclick="goToUpload()">

+ Upload Product

</button>

<a href="subscription.html">

<button class="upload-btn">

⭐ Subscription Plans

</button>

</a>

<button class="logout-btn" onclick="logout()">

Logout

</button>

</div>

</div>

<div class="container">

<div class="subscription-card">

<div class="subscription-title">

<h2>⭐ Premium Membership</h2>

<div id="planBadge" class="plan-badge">

Loading...

</div>

</div>

<div class="info-grid">

<div class="info-box">

<h3>Business Model</h3>

<p id="businessModel">

Loading...

</p>

</div>

<div class="info-box">

<h3>Uploads Used</h3>

<p id="uploads">

Loading...

</p>

</div>

<div class="info-box">

<h3>Expiry</h3>

<p id="expiry">

Loading...

</p>

</div>

<div class="info-box">

<h3>Benefits</h3>

<p id="planBenefits">

Loading...

</p>

</div>

</div>

<div class="progress">

<div id="progressBar" class="progress-bar"></div>

</div>

</div>

<div id="products"></div>


<script>

let seller = JSON.parse(localStorage.getItem("seller"));

if (!seller) {
    window.location.href = "seller-login.html";
}

document.getElementById("sellerName").innerText = seller.name;

// Load dashboard
loadSellerDetails();
loadSellerProducts();

async function loadSellerDetails() {

    try {

        const response = await fetch(
            `https://campusduka-api.onrender.com/seller-details/${seller.id}`
        );

        const data = await response.json();

        seller = data.seller;

        // Update localStorage
        localStorage.setItem(
            "seller",
            JSON.stringify(seller)
        );

        // Seller Name
        document.getElementById("sellerName").innerHTML =
            seller.name;

        // Business Model
        document.getElementById("businessModel").innerHTML =
            seller.business_model;

        // Upload Limit
        let limit;

        switch (seller.subscription_plan) {

            case "free":
                limit = 2;
                break;

            case "copper":
                limit = 20;
                break;

            case "bronze":
                limit = 100;
                break;

            case "gold":
                limit = "Unlimited";
                break;

            default:
                limit = 2;

        }

        document.getElementById("uploads").innerHTML =
            seller.uploads_used + " / " + limit;

        // Progress Bar
        if (limit !== "Unlimited") {

            const percent =
                (seller.uploads_used / limit) * 100;

            document.getElementById("progressBar").style.width =
                percent + "%";

        } else {

            document.getElementById("progressBar").style.width =
                "100%";

        }

        // Plan Badge

        const badge =
            document.getElementById("planBadge");

        badge.className =
            "plan-badge " + seller.subscription_plan;

        badge.innerHTML =
            seller.subscription_plan.toUpperCase();

        // Expiry

        if (seller.subscription_expiry) {

            const expiry =
                new Date(seller.subscription_expiry);

            const today =
                new Date();

            const days =
                Math.ceil(
                    (expiry - today) /
                    (1000 * 60 * 60 * 24)
                );

            document.getElementById("expiry").innerHTML =
                expiry.toDateString() +
                "<br>" +
                days +
                " days remaining";

        } else {

            document.getElementById("expiry").innerHTML =
                "No Expiry";

        }

        // Benefits

        let benefits = "";

        switch (seller.subscription_plan) {

            case "free":

                benefits =
                    "2 Product Uploads";

                break;

            case "copper":

                benefits =
                    "20 Uploads • Featured Badge";

                break;

            case "bronze":

                benefits =
                    "100 Uploads • Priority Approval";

                break;

            case "gold":

                benefits =
                    "Unlimited Uploads • Homepage Promotion • Analytics";

                break;

        }

        document.getElementById("planBenefits").innerHTML =
            benefits;

    }

    catch (err) {

        console.log(err);

    }

}
  // ===============================
// LOAD SELLER PRODUCTS
// ===============================

async function loadSellerProducts() {

    try {

        const response = await fetch(
            `https://campusduka-api.onrender.com/seller-products/${seller.id}`
        );

        const products = await response.json();

        const container =
            document.getElementById("products");

        container.innerHTML = "";

        if (products.length === 0) {

            container.innerHTML = `

            <div class="empty">

                <h2>📦 No Products Yet</h2>

                <br>

                <p>
                Start selling by clicking
                <b>Upload Product</b>.
                </p>

            </div>

            `;

            return;

        }

        products.forEach(product => {

            let image =
                "images/food1.jpg";

            if (
                product.images &&
                product.images.length > 0
            ) {
                image = product.images[0];
            }

            let statusClass =
                product.status;

            let statusText = "";

            if (product.status === "approved") {

                statusText =
                    "✅ Approved";

            }

            else if (product.status === "pending") {

                statusText =
                    "⏳ Pending Approval";

            }

            else {

                statusText =
                    "❌ Rejected";

            }

            container.innerHTML += `

            <div class="product">

                <img src="${image}">

                <div class="product-body">

                    <h2>${product.name}</h2>

                    <div class="price">

                        KES ${product.price}

                    </div>

                    <div class="category">

                        ${product.category}

                    </div>

                    <p>

                        ${product.description}

                    </p>

                    <div class="status ${statusClass}">

                        ${statusText}

                    </div>

                    ${
                        product.status === "rejected"

                        ?

                        `<p style="margin-top:15px;color:red;">
                        Reason:
                        ${product.rejection_reason || "Not provided"}
                        </p>`

                        :

                        ""

                    }

                </div>

            </div>

            `;

        });

    }

    catch(err){

        console.log(err);

    }

}


// ===============================
// UPLOAD BUTTON
// ===============================

async function goToUpload(){

    try{

        const response = await fetch(

            `https://campusduka-api.onrender.com/seller-details/${seller.id}`

        );

        const data =
            await response.json();

        seller =
            data.seller;

        localStorage.setItem(

            "seller",

            JSON.stringify(seller)

        );

        if(seller.subscription_plan === "free"){

            alert(

                "Please subscribe before uploading products."

            );

            window.location.href =
                "subscription.html";

            return;

        }

        window.location.href =
            "add-product.html";

    }

    catch(err){

        console.log(err);

        alert(

            "Unable to verify subscription."

        );

    }

}


// ===============================
// LOGOUT
// ===============================

function logout(){

    localStorage.removeItem("seller");

    window.location.href =
        "seller-login.html";

}
</body>
</html>
