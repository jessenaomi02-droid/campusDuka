
<!DOCTYPE html>
<html>

<head>

<title>CampusDuka Seller Dashboard</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

background:#f5f7fb;

padding:20px;

color:#333;

}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#0077ff,
#005fcc
);

padding:30px;

border-radius:20px;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

margin-bottom:30px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}

.header h1{

font-size:32px;

}

.header p{

margin-top:8px;

opacity:.9;

}

/* BUTTONS */

.actions{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-top:20px;

}

button{

border:none;

padding:12px 20px;

border-radius:10px;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.upload-btn{

background:white;

color:#0077ff;

}

.upload-btn:hover{

transform:translateY(-3px);

}

.logout-btn{

background:#ff4d4d;

color:white;

}

.logout-btn:hover{

background:#e60000;

}

/* PRODUCTS */

#products{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

}

/* CARD */

.card{

background:white;

padding:18px;

border-radius:18px;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

transition:.3s;

overflow:hidden;

}

.card:hover{

transform:translateY(-5px);

}

img{

width:100%;

height:220px;

object-fit:cover;

border-radius:12px;

margin-bottom:15px;

}

.card h2{

margin-bottom:10px;

font-size:22px;

}

.price{

color:#0077ff;

font-size:22px;

font-weight:700;

margin:12px 0;

}

.category{

display:inline-block;

background:#e6f0ff;

color:#0077ff;

padding:6px 12px;

border-radius:20px;

font-size:13px;

margin-bottom:12px;

}

/* STATUS */

.status{

padding:8px 15px;

border-radius:20px;

color:white;

display:inline-block;

margin-top:15px;

font-size:14px;

font-weight:600;

}

.pending{

background:orange;

}

.approved{

background:green;

}

/* EMPTY */

.empty{

background:white;

padding:40px;

border-radius:15px;

text-align:center;

box-shadow:
0 4px 12px rgba(0,0,0,.08);

}

/* MOBILE */

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

}

.header h1{

font-size:26px;

}

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>

CampusDuka Seller Dashboard

</h1>

<p>

Welcome back,
<span id="sellerName"></span>
🚀

</p>

</div>

<div class="actions">

<a href="add-product.html">

<button class="upload-btn">

+ Upload Product

</button>

</a>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

</div>

<div id="products">

</div>

<script>

const seller=
JSON.parse(
localStorage.getItem("seller")
);

if(!seller){

window.location.href=
"seller-login.html";

}

document.getElementById(
"sellerName"
).innerText=seller.name;

function logout(){

localStorage.removeItem(
"seller"
);

window.location.href=
"seller-login.html";

}

async function loadSellerProducts(){

const response=
await fetch(

`https://campusduka-api.onrender.com/seller-products/${seller.id}`

);

const products=
await response.json();

const container=
document.getElementById(
"products"
);

container.innerHTML="";

if(products.length===0){

container.innerHTML=`

<div class="empty">

<h2>

No Products Yet

</h2>

<p>

Click Upload Product to start selling on CampusDuka.

</p>

</div>

`;

return;

}

products.forEach(product=>{

const image=

product.images &&
product.images.length

?

product.images[0]

: "images/food1.jpg";

container.innerHTML+=`

<div class="card">

<img src="${image}">

<h2>

${product.name}

</h2>

<div class="price">

KES ${product.price}

</div>

<div class="category">

${product.category}

</div>

<p>

${product.description}

</p>

<div class="status ${product.status}">

${product.status}

</div>

<p style="margin-top:12px;">

${product.status==="approved"

? "✅ Your product was approved and is now visible to buyers."

: "⏳ Waiting for admin approval."}

</p>

</div>

`;

});

}

loadSellerProducts();

</script>

</body>
</html>
