<!DOCTYPE html>
<html>

<head>

<title>Seller Dashboard</title>

<style>

body{

font-family:Poppins,sans-serif;

background:#f5f7fb;

padding:20px;

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

margin-bottom:15px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

img{

width:120px;

height:120px;

object-fit:cover;

border-radius:10px;

}

.status{

padding:6px 12px;

border-radius:20px;

color:white;

display:inline-block;

margin-top:10px;

}

.pending{
background:orange;
}

.approved{
background:green;
}

</style>

</head>

<body>

<div class="top">

<h1>

Seller Dashboard

</h1>

<button onclick="logout()">

Logout

</button>

</div>

<div id="products">

</div>

<script>

const seller=
JSON.parse(
localStorage.getItem("seller")
);

if(!seller){

window.location.href=
"seller-login.html";

}

function logout(){

localStorage.removeItem(
"seller"
);

window.location.href=
"seller-login.html";

}

</script>

</body>
</html>
