<!DOCTYPE html>
<html>

<head>

<title>Seller Dashboard</title>

<style>

body{

font-family:Poppins,sans-serif;

background:#f5f7fb;

padding:20px;

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

margin-bottom:15px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

img{

width:120px;

height:120px;

object-fit:cover;

border-radius:10px;

}

.status{

padding:6px 12px;

border-radius:20px;

color:white;

display:inline-block;

margin-top:10px;

}

.pending{
background:orange;
}

.approved{
background:green;
}

</style>

</head>

<body>

<div class="top">

<h1>

Seller Dashboard

</h1>

<button onclick="logout()">

Logout

</button>

</div>

<div id="products">

</div>

<script>

const seller=
JSON.parse(
localStorage.getItem("seller")
);

if(!seller){

window.location.href=
"seller-login.html";

}

function logout(){

localStorage.removeItem(
"seller"
);

window.location.href=
"seller-login.html";

}

async function loadSellerProducts(){

const response=
await fetch(

`https://campusduka-api.onrender.com/seller-products/${seller.id}`

);

const products=
await response.json();

const container=
document.getElementById(
"products"
);

container.innerHTML="";

products.forEach(product=>{

const image=

product.images &&
product.images.length

? product.images[0]

: "images/food1.jpg";

container.innerHTML+=`

<div class="card">

<img src="${image}">

<h2>
${product.name}
</h2>

<p>
${product.description}
</p>

<h3>
KES ${product.price}
</h3>

<div class="status ${product.status}">

${product.status}

</div>
<p>

${product.status==="approved"

? "✅ Your product was approved"

: "⏳ Waiting for admin approval"}

</p>

</div>

`;

});

}

loadSellerProducts();

</script>

</body>
</html>
