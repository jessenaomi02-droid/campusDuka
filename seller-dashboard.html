
<!DOCTYPE html>
<html>

<head>

<title>CampusDuka Seller Dashboard</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

background:#f5f7fb;

padding:20px;

color:#333;

}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#0077ff,
#005fcc
); 

padding:30px;

border-radius:20px;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

margin-bottom:30px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}

.header h1{

font-size:32px;

}

.header p{

margin-top:8px;

opacity:.9;

}

/* BUTTONS */

.actions{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-top:20px;

}

button{

border:none;

padding:12px 20px;

border-radius:10px;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.upload-btn{

background:white;

color:#0077ff;

}

.upload-btn:hover{

transform:translateY(-3px);

}

.logout-btn{

background:#ff4d4d;

color:white;

}

.logout-btn:hover{

background:#e60000;

}

.subscription-card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

margin-bottom:30px;

}

.subscription-card h2{

color:#0077ff;

margin-bottom:15px;

}

.subscription-card p{

margin:12px 0;

font-size:16px;

}

.plan-btn{

margin-top:15px;

background:#0077ff;

color:white;

}
  .progress{

width:100%;

height:12px;

background:#e6e6e6;

border-radius:20px;

overflow:hidden;

margin-top:10px;

}

.progress-bar{

height:100%;

width:0%;

background:#0077ff;

transition:.5s;

}

.plan-btn:hover{

transform:translateY(-3px);

}  

/* PRODUCTS */

#products{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

}

/* CARD */

.card{

background:white;

padding:18px;

border-radius:18px;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

transition:.3s;

overflow:hidden;

}

.card:hover{

transform:translateY(-5px);

}

img{

width:100%;

height:220px;

object-fit:cover;

border-radius:12px;

margin-bottom:15px;

}

.card h2{

margin-bottom:10px;

font-size:22px;

}

.price{

color:#0077ff;

font-size:22px;

font-weight:700;

margin:12px 0;

}

.category{

display:inline-block;

background:#e6f0ff;

color:#0077ff;

padding:6px 12px;

border-radius:20px;

font-size:13px;

margin-bottom:12px;

}

/* STATUS */

.status{

padding:8px 15px;

border-radius:20px;

color:white;

display:inline-block;

margin-top:15px;

font-size:14px;

font-weight:600;

}

.pending{

background:orange;

}

.approved{

background:green;

}

/* EMPTY */

.empty{

background:white;

padding:40px;

border-radius:15px;

text-align:center;

box-shadow:
0 4px 12px rgba(0,0,0,.08);

}

/* MOBILE */

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

}

.header h1{

font-size:26px;

}

}

</style>

</head>

<body>

<div class="header">

<div>

<h1>

CampusDuka Seller Dashboard

</h1>

<p>

Welcome back,
<span id="sellerName"></span>
🚀

</p>

</div>

<div class="actions">

<button
class="upload-btn"
onclick="goToUpload()">

+ Upload Product

</button>
<a href="subscription.html">

<button class="upload-btn">

⭐ Subscription Plans

</button>

</a>

<button
class="logout-btn"
onclick="logout()">

Logout

</button>

</div>

</div>

  <div class="subscription-card">

<h2>

⭐ CampusDuka Premium Membership

</h2>

<p>

🏆 Current Plan

<br><br>

<span
id="plan"
style="
font-size:28px;
font-weight:bold;
color:#0077ff;
">

Loading...

</span>

</p>

<p>

💼 Business Model:

<span id="businessModel">

Loading...

</span>

</p>

<p>

📦 Uploads Used:

<span id="uploads">

Loading...

</span>

</p>

    <div class="progress">

<div
id="progressBar"
class="progress-bar">

</div>

</div>

<p>

📅 Valid Until:

<span id="expiry">

Loading...

</span>

</p>

    <p id="planBenefits">

Loading benefits...

</p>

<a href="subscription.html">

<button class="plan-btn">

⭐ Manage Subscription

</button>

</a>

</div>

  
<div id="products">

</div>

<script>

const seller=
JSON.parse(
localStorage.getItem("seller")
);

if(!seller){

window.location.href=
"seller-login.html";

}

document.getElementById(
"sellerName"
).innerText=seller.name;

  loadSellerDetails();

async function loadSellerDetails(){

const response=

await fetch(

`https://campusduka-api.onrender.com/seller-details/${seller.id}`

);

const data=

await response.json();

const sellerData=

data.seller;

let planBadge=
"<span style='color:#777;'>🆓 FREE</span>";

if(
sellerData.subscription_plan==="copper"
){
planBadge=
"<span style='color:#cd7f32;'>🥈 COPPER</span>";
}

else if(
sellerData.subscription_plan==="bronze"
){
planBadge=
"<span style='color:#b87333;'>🥉 BRONZE</span>";
}

else if(
sellerData.subscription_plan==="gold"
){
planBadge=
"<span style='color:#f4b400;'>🏆 GOLD</span>";
}

document.getElementById(
"plan"
).innerHTML=
planBadge;
document.getElementById(

"businessModel"

).innerHTML=

sellerData.business_model;

let limit="Unlimited";

if(

sellerData.subscription_plan==="free"

){

limit=2;

}

else if(

sellerData.subscription_plan==="copper"

){

limit=20;

}

else if(

sellerData.subscription_plan==="bronze"

){

limit=100;

}

document.getElementById(

"uploads"

).innerHTML=

`${sellerData.uploads_used}/${limit}`;

  if(limit!=="Unlimited"){

const percent=

(
sellerData.uploads_used
/
limit
)
*100;

document.getElementById(
"progressBar"
).style.width=
percent+"%";

}else{

document.getElementById(
"progressBar"
).style.width=
"100%";

}

document.getElementById(

"expiry"

).innerHTML=
  let daysRemaining = "";

if(sellerData.subscription_expiry){

const expiryDate =
new Date(sellerData.subscription_expiry);

const today =
new Date();

const diff =
Math.ceil(

(expiryDate - today)

/

(1000*60*60*24)

);

daysRemaining =
` (${diff} days remaining)`;

}

document.getElementById(

"expiry"

).innerHTML =

sellerData.subscription_expiry

?

new Date(

sellerData.subscription_expiry

).toDateString()

+ daysRemaining

:

"No expiry";

sellerData.subscription_expiry

?

new Date(

sellerData.subscription_expiry

).toDateString()

:

"No expiry";

  let benefits="";

if(
sellerData.subscription_plan==="free"
){

benefits=
"2 uploads • Basic listings";

}

else if(
sellerData.subscription_plan==="copper"
){

benefits=
"20 uploads • Featured badge ⭐";

}

else if(
sellerData.subscription_plan==="bronze"
){

benefits=
"100 uploads • Featured badge ⭐ • Priority approval";

}

else if(
sellerData.subscription_plan==="gold"
){

benefits=
"Unlimited uploads • Homepage promotion • Analytics • Priority approval";

}

document.getElementById(
"planBenefits"
).innerHTML=
benefits;

}

function logout(){

localStorage.removeItem(
"seller"
);

window.location.href=
"seller-login.html";

}

async function loadSellerProducts(){

const response=
await fetch(

`https://campusduka-api.onrender.com/seller-products/${seller.id}`

);

const products=
await response.json();

const container=
document.getElementById(
"products"
);

container.innerHTML="";

if(products.length===0){

container.innerHTML=`

<div class="empty">

<h2>

No Products Yet

</h2>

<p>

Click Upload Product to start selling on CampusDuka.

</p>

</div>

`;

return;

}

products.forEach(product=>{

const image=

product.images &&
product.images.length

?

product.images[0]

: "images/food1.jpg";

container.innerHTML+=`

<div class="card">

<img src="${image}">

<h2>

${product.name}

</h2>

<div class="price">

KES ${product.price}

</div>

<div class="category">

${product.category}

</div>

<p>

${product.description}

</p>

<div class="status ${product.status}">

${product.status}

</div>

<p style="margin-top:12px;">

${product.status==="approved"

? "✅ Your product was approved"

: product.status==="rejected"

? `❌ Product Rejected<br><br>
Reason: ${product.rejection_reason || "No reason provided"}`

: "⏳ Waiting for admin approval"}

</p>

</div>

`;

});

}
  async function goToUpload(){

const response = await fetch(
`https://campusduka-api.onrender.com/seller-details/${seller.id}`
);

const data = await response.json();

const sellerData = data.seller;

    localStorage.setItem(
"seller",
JSON.stringify(sellerData)
);

// Update localStorage
localStorage.setItem(
"seller",
JSON.stringify(sellerData)
);

if(
sellerData.subscription_plan==="free"
){

alert(
"You need an active subscription before uploading products."
);

window.location.href="subscription.html";

return;

}

window.location.href="add-product.html";

}
  
loadSellerProducts();

</script>

</body>
</html>
