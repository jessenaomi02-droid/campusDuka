<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusDuka | Events</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
/* ==========================================
   COLOR SYSTEM & VARIABLES (Your Brand Palette)
   ========================================== */
:root{
  --color-charcoal: #1f2d3d;      /* Base darks, navbars, footers */
  --color-slate-teal: #164e63;    /* Main brand color, borders, primary elements */
  --color-medium-teal: #1f6b88;   /* Primary hover states */
  --color-accent-blue: #4589be;   /* Nav hover active borders, subtle glow */
  
  --bg-main: #f8fafc;             /* Soft cool grey background */
  --text-dark: #1f2d3d;           /* Deep slate for readability */
  --text-muted: #64748b;          /* Cool grey for metadata */
  --card-bg: #ffffff;
  --border-light: #e2e8f0;        
  
  /* SHADOWS & RADII */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(31, 45, 61, 0.08), 0 2px 4px -1px rgba(31, 45, 61, 0.04);
  --shadow-lg: 0 10px 20px -3px rgba(31, 45, 61, 0.12), 0 4px 6px -4px rgba(31, 45, 61, 0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

body{
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg-main);
  color: var(--text-dark);
  -webkit-font-smoothing: antialiased;
}

*{
  box-sizing: border-box;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ================= NAVBAR ================= */
.navbar{
  background: var(--color-charcoal);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 5%;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid var(--color-slate-teal);
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.logo-link {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  background: transparent;
}

.logo-svg {
  height: 40px;
  width: auto;
}

.logo-text {
  color: #ffffff;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo-text span {
  color: var(--color-accent-blue);
}

.nav-links{
  display: flex;
  gap: 20px;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-links a{
  color: rgba(255, 255, 255, 0.85);
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  padding: 6px 12px;
  border-bottom: 2px solid transparent;
}

.nav-links a:hover, .nav-links a.active{
  color: var(--color-accent-blue);
  border-bottom: 2px solid var(--color-accent-blue);
}

.menu-icon{
  display: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* ================= HERO BANNER ================= */
.hero{
  height: 300px;
  background: linear-gradient(rgba(31, 45, 61, 0.8), rgba(22, 78, 99, 0.7)), url("images/event1.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 0 20px;
}

.hero h1{
  font-size: 38px;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.hero h1 span {
  color: var(--color-accent-blue);
}

.hero p {
  font-size: 16px;
  opacity: 0.9;
  font-weight: 500;
}

/* ================= FILTER & SEARCH STRIP ================= */
.filter-search-container {
  max-width: 1200px;
  margin: -30px auto 20px;
  padding: 0 20px;
  position: relative;
  z-index: 10;
}

.search-filter-card {
  background: white;
  padding: 16px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-light);
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 15px;
  align-items: center;
}

.search-box-wrapper {
  display: flex;
  background: #f1f5f9;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  align-items: center;
  gap: 10px;
}

.search-box-wrapper:focus-within {
  border-color: var(--color-slate-teal);
  background: white;
}

.search-box-wrapper i {
  color: var(--text-muted);
}

.search-box-wrapper input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-family: inherit;
  font-size: 14px;
  color: var(--text-dark);
}

.filter-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.filter-btn {
  border: 1px solid var(--border-light);
  background: white;
  color: var(--text-dark);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
}

.filter-btn:hover, .filter-btn.active {
  background: var(--color-slate-teal);
  color: white;
  border-color: var(--color-slate-teal);
}

/* ================= EVENTS GRID ================= */
.product-container{
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 28px;
  padding: 20px 20px 60px;
}

.product-card{
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  position: relative;
}

.product-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
}

.event-price-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--color-slate-teal);
  color: white;
  padding: 6px 12px;
  font-weight: 700;
  border-radius: var(--radius-sm);
  font-size: 12px;
  z-index: 5;
  box-shadow: var(--shadow-md);
}

.event-price-badge.free {
  background: #10b981;
}

.img-wrapper {
  width: 100%;
  height: 190px;
  overflow: hidden;
  background: #f1f5f9;
}

.product-card img{
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-details {
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.product-card h3{
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-dark);
  line-height: 1.4;
}

.product-card p{
  color: var(--color-slate-teal);
  font-weight: 800;
  font-size: 16px;
  margin-bottom: 8px;
  display: none; /* Handled beautifully by our pricing badge, but kept in backend */
}

.product-card small{
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.5;
  height: 38px;
  margin-bottom: 18px;
}

.bn{
  background: var(--color-slate-teal);
  color: white;
  border: none;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  width: 100%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: auto;
}

.bn:hover {
  background: var(--color-medium-teal);
}

/* ================= NO RESULTS STATE ================= */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  background: white;
  border-radius: var(--radius-lg);
  border: 1px dashed var(--border-light);
}

.no-results i {
  font-size: 48px;
  margin-bottom: 15px;
  color: var(--text-muted);
  opacity: 0.5;
}

.no-results h3 {
  color: var(--text-dark);
  margin-bottom: 8px;
}

/* ================= MODAL ================= */
.modal{
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(4px);
  justify-content: center;
  align-items: center;
  z-index: 2000;
  padding: 20px;
}

.modal-content{
  background: white;
  padding: 25px;
  width: 100%;
  max-width: 500px;
  border-radius: var(--radius-lg);
  position: relative;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  border: 1px solid var(--border-light);
}

.close-btn{
  position: absolute;
  right: 20px;
  top: 15px;
  font-size: 28px;
  cursor: pointer;
  color: var(--text-muted);
}

.close-btn:hover {
  color: var(--text-dark);
}

#mainImage{
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: var(--radius-md);
  background: #f1f5f9;
}

.thumbnail-container{
  margin-top: 12px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.thumbnail-container img{
  width: 65px;
  height: 65px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  object-fit: cover;
  border: 2px solid transparent;
}

.thumbnail-container img:hover {
  border-color: var(--color-slate-teal);
}

/* ================= FOOTER ================= */
footer{
  background: var(--color-charcoal);
  color: white;
  text-align: center;
  padding: 24px;
  font-size: 14px;
  border-top: 3px solid var(--color-slate-teal);
}

/* ================= MEDIA QUERY BREAKPOINTS ================= */
@media (max-width: 768px) {
  .menu-icon {
    display: block;
  }
  .nav-links {
    display: none;
    position: absolute;
    top: 68px;
    left: 0;
    width: 100%;
    background: var(--color-charcoal);
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    text-align: center;
    border-bottom: 2px solid var(--color-slate-teal);
    box-shadow: var(--shadow-md);
  }
  .nav-links a {
    display: block;
    width: 100%;
  }
  .nav-links.active {
    display: flex;
  }
  .search-filter-card {
    grid-template-columns: 1fr;
  }
  .filter-buttons {
    justify-content: center;
  }
  .hero h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <a href="index2.html" class="logo-link">
    <!-- Inline SVG CampusDuka Logo -->
    <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#164e63" />
          <stop offset="100%" stop-color="#4589be" />
        </linearGradient>
      </defs>
      <rect x="20" y="25" width="60" height="50" rx="8" fill="url(#logo-grad)" />
      <polygon points="50,15 20,25 80,25" fill="#ffffff" />
      <circle cx="50" cy="50" r="10" fill="#ffffff" />
      <path d="M44,50 L56,50 M50,44 L50,56" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" />
    </svg>
    <span class="logo-text">Campus<span>Duka</span></span>
  </a>

  <div class="menu-icon" id="menuIcon">
    <i class="fas fa-bars"></i>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index2.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="food.html">Fast Foods</a></li>
    <li><a href="events.html" class="active">Events</a></li>
  </ul>
</nav>

<!-- ================= HERO BANNER ================= -->
<section class="hero">
  <div>
    <h1>Campus <span>Events</span></h1>
    <p>Discover plans, tech meetups, festivals, & campus life</p>
  </div>
</section>

<!-- ================= SEARCH & FILTER CONTROL BAR ================= -->
<div class="filter-search-container">
  <div class="search-filter-card">
    <div class="search-box-wrapper">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="eventSearch" placeholder="Search events by name or keyword..." oninput="filterEvents()">
    </div>
    <div class="filter-buttons">
      <button class="filter-btn active" onclick="setPriceFilter('all', this)">All Plans</button>
      <button class="filter-btn" onclick="setPriceFilter('free', this)">Free Entrance</button>
      <button class="filter-btn" onclick="setPriceFilter('paid', this)">Tickets</button>
    </div>
  </div>
</div>

<!-- ================= EVENTS GRID ================= -->
<div class="product-container" id="product-container"></div>

<!-- ================= EVENT MODAL ================= -->
<div class="modal" id="viewModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="mainImage" alt="Main View Image">
    <div id="thumbnails" class="thumbnail-container"></div>
  </div>
</div>

<!-- ================= FOOTER ================= -->
<footer>
  &copy; 2026 CampusDuka • All Rights Reserved
</footer>

<script>
// Mobile navigation menu toggle
const menuIcon = document.getElementById("menuIcon");
const navLinks = document.getElementById("navLinks");
menuIcon.onclick = () => {
  navLinks.classList.toggle("active");
};

let rawEventsData = [];
let priceFilterState = "all";

/* GENERATE TEMPLATE ENGINE */
function buildEventCardMarkup(product) {
  const imgs = product.images && product.images.length ? product.images : ["images/event1.jpg"];
  const first = imgs[0];
  const isFree = product.price == 0;
  const priceDisplay = isFree ? 'Free' : `KES ${product.price}`;
  
  return `
    <div class="product-card">
      <div class="event-price-badge ${isFree ? 'free' : ''}">
        ${priceDisplay}
      </div>
      <div class="img-wrapper">
        <img src="${first}" alt="${product.name}" loading="lazy">
      </div>
      <div class="card-details">
        <h3>${product.name}</h3>
        <small>${product.description || 'No additional details provided for this event.'}</small>
        <button class="bn" onclick='viewProduct(${JSON.stringify(imgs)})'>
          <i class="fa-solid fa-ticket"></i> View Details
        </button>
      </div>
    </div>
  `;
}

/* FETCH & ALLOCATE COMPONENT RENDERING */
async function loadProducts(){
  try {
    const response = await fetch("https://campusduka-api.onrender.com/products");
    const products = await response.json();
    
    // Cache the pure events list locally
    rawEventsData = products.filter(product => product.category === "Events");
    filterEvents();
  } catch (error) {
    console.error("Error reading events from backend api:", error);
    document.getElementById("product-container").innerHTML = `
      <div class="no-results">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>Connection Error</h3>
        <p>Could not connect to the campus event pipeline.</p>
      </div>`;
  }
}

/* FILTER AND SEARCH MATRIX */
function filterEvents() {
  const query = document.getElementById("eventSearch").value.toLowerCase().trim();
  const container = document.getElementById("product-container");
  container.innerHTML = "";

  let filtered = rawEventsData;

  // Filter 1: Price State
  if (priceFilterState === "free") {
    filtered = filtered.filter(event => event.price == 0);
  } else if (priceFilterState === "paid") {
    filtered = filtered.filter(event => event.price > 0);
  }

  // Filter 2: Search String
  if (query) {
    filtered = filtered.filter(event => 
      event.name.toLowerCase().includes(query) || 
      (event.description && event.description.toLowerCase().includes(query))
    );
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <i class="fa-solid fa-calendar-xmark"></i>
        <h3>No plans found</h3>
        <p>Try modifying your search or changing the filter.</p>
      </div>`;
    return;
  }

  filtered.forEach(product => {
    container.innerHTML += buildEventCardMarkup(product);
  });
}

function setPriceFilter(type, element) {
  document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
  element.classList.add("active");
  priceFilterState = type;
  filterEvents();
}

/* IMAGE DISPLAY INTERACTION */
function viewProduct(images){
  const modal = document.getElementById("viewModal");
  const main = document.getElementById("mainImage");
  const thumbs = document.getElementById("thumbnails");
  
  main.src = images[0];
  thumbs.innerHTML = "";

  images.forEach(img => {
    let t = document.createElement("img");
    t.src = img;
    t.onclick = () => { main.src = img; };
    thumbs.appendChild(t);
  });

  modal.style.display = "flex";
}

// Close modal when clicking outside modal box
window.onclick = function(event) {
  const modal = document.getElementById("viewModal");
  if (event.target === modal) {
    closeModal();
  }
}

function closeModal(){
  document.getElementById("viewModal").style.display = "none";
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
