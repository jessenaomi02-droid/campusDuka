<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusDuka | Campus Events</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#f5f5f5;
}

/* NAVBAR */

.navbar{
    background:#0a74da;
    padding:15px 20px;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.navdiv{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    color:white;
    text-decoration:none;
    font-size:28px;
    font-weight:bold;
}

.navdiv ul{
    display:flex;
    list-style:none;
    gap:20px;
    margin:0;
    padding:0;
}

.navdiv ul li a{
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:.3s;
}

.navdiv ul li a:hover{
    color:#dbeafe;
}

.cart-link{
    position:relative;
    color:white;
    text-decoration:none;
    font-size:22px;
}

#cart-count{
    background:red;
    color:white;
    border-radius:50%;
    padding:2px 6px;
    font-size:12px;
    position:absolute;
    top:-8px;
    right:-10px;
}

/* PAGE TITLE */

h2{
    text-align:center;
    color:#0a74da;
    margin-top:30px;
}

/* EVENTS */

.event-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.event-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    transition:.3s;
    text-align:center;
}

.event-card:hover{
    transform:translateY(-5px);
}

.event-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.event-card h3{
    margin:10px;
}

.event-card p{
    margin:5px;
}

.bn{
    background:#0a74da;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:6px;
    margin:10px 5px 15px;
    cursor:pointer;
}

.bn:hover{
    background:#085cb4;
}

/* FOOTER */

footer{
    background:#0a74da;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

/* MOBILE */

@media(max-width:768px){

.navdiv{
    flex-direction:column;
    gap:12px;
}

.navdiv ul{
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="navdiv">

<a href="index2.html" class="logo">
CampusDuka
</a>

<ul>
<li><a href="index2.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="food.html">Fast Foods</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<a href="cart.html" class="cart-link">
<i class="fas fa-shopping-cart"></i>
<span id="cart-count">0</span>
</a>

</div>

</nav>

<h2>Campus Events</h2>

<div class="event-container">

<div class="event-card">
<img src="images/pi.png.jfif" alt="Freshers Night">

<h3>Freshers Night</h3>

<p>📍 Campus Hall</p>

<p>🗓️ Sept 7, 2025</p>

<p>⏰ 10 PM</p>

<p>KES 150</p>

<button class="bn">
View Details
</button>

<button class="bn book-btn">
Book Ticket
</button>

</div>


<div class="event-card">

<img src="images/pi.png.jfif" alt="Cultural Festival">

<h3>Cultural Festival</h3>

<p>📍 Sports Field</p>

<p>🗓️ Oct 20, 2025</p>

<p>⏰ 2 PM</p>

<p>KES 200</p>

<button class="bn">
View Details
</button>

<button class="bn book-btn">
Book Ticket
</button>

</div>

</div>

<footer>

© 2025 CampusDuka. All Rights Reserved.

</footer>


<script>

function updateCartCount(){

let cart=
JSON.parse(
localStorage.getItem('cart')
)||[];

let count=
cart.reduce(
(sum,item)=>
sum+item.quantity,
0
);

document.getElementById(
'cart-count'
).innerText=count;

}

document.addEventListener(
"DOMContentLoaded",
updateCartCount
);


/* Event booking */

document.addEventListener(
"DOMContentLoaded",
()=>{

const bookButtons=
document.querySelectorAll(
".book-btn"
);

bookButtons.forEach(btn=>{

btn.addEventListener(
"click",
()=>{

const card=
btn.closest(
".event-card"
);

const name=
card.querySelector(
"h3"
).textContent;

const venue=
card.querySelector(
"p:nth-of-type(1)"
).textContent;

const date=
card.querySelector(
"p:nth-of-type(2)"
).textContent;

const time=
card.querySelector(
"p:nth-of-type(3)"
).textContent;

const priceText=
card.querySelector(
"p:nth-of-type(4)"
).textContent
.replace(
"KES",
""
)
.trim();

const price=
parseFloat(
priceText
);

const image=
card.querySelector(
"img"
).src;

const eventItem={
name,
venue,
date,
time,
price,
image,
quantity:1
};

const eventCart=
JSON.parse(
localStorage.getItem(
"eventCart"
)
)||[];

eventCart.push(
eventItem
);

localStorage.setItem(
"eventCart",
JSON.stringify(
eventCart
)
);

alert(
`✅ You booked "${name}" successfully`
);

});

});

});

</script>

</body>
</html>
