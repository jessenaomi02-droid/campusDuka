<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>CampusDuka | Events</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
}

.navbar{
background:#0077ff;
padding:15px 25px;
}

.navdiv{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:white;
text-decoration:none;
}

.navdiv ul{
display:flex;
list-style:none;
gap:15px;
}

.navdiv a{
color:white;
text-decoration:none;
}

.hero{

height:300px;

background:

linear-gradient(
rgba(0,0,0,.5),
rgba(0,0,0,.5)
),

url("images/event1.jpg");

background-size:cover;
background-position:center;

display:flex;

justify-content:center;

align-items:center;

color:white;

text-align:center;

}

.hero h1{
font-size:42px;
}

.product-container{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);

gap:20px;

padding:40px;

}

.product-card{

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:
0 3px 10px rgba(0,0,0,.1);

padding-bottom:15px;

text-align:center;

}

.product-card img{

width:100%;
height:180px;
object-fit:cover;

}

.bn{

background:#0077ff;

color:white;

border:none;

padding:8px 15px;

border-radius:20px;

margin:5px;

cursor:pointer;

}


/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);

justify-content:center;
align-items:center;

z-index:1000;
}

.modal-content{

background:white;

padding:20px;

width:90%;

max-width:500px;

border-radius:10px;

position:relative;

text-align:center;

}

.close-btn{

position:absolute;

right:15px;
top:10px;

font-size:25px;
cursor:pointer;

}

#mainImage{

width:100%;
height:300px;

object-fit:cover;

border-radius:10px;

}

.thumbnail-container img{

width:70px;
height:70px;

margin:4px;

border-radius:8px;

cursor:pointer;

}

footer{

background:#0077ff;
color:white;

text-align:center;

padding:15px;

}

</style>
</head>

<body>

<nav class="navbar">

<div class="navdiv">

<a
href="index2.html"
class="logo">

CampusDuka

</a>

<ul>

<li><a href="index2.html">Home</a></li>

<li><a href="products.html">Products</a></li>

<li><a href="food.html">Food</a></li>

<li><a href="events.html">Events</a></li>

</ul>

</div>

</nav>


<section class="hero">

<div>

<h1>

Campus Events

</h1>

<p>

Discover parties, meetups & campus life

</p>

</div>

</section>


<div
class="product-container"
id="product-container">

</div>


<div
class="modal"
id="viewModal">

<div class="modal-content">

<span
class="close-btn"
onclick="closeModal()">

×

</span>

<img id="mainImage">

<div
id="thumbnails"
class="thumbnail-container">

</div>

</div>

</div>


<footer>

© CampusDuka 2025

</footer>


<script>

async function loadProducts(){

const response=
await fetch(
"https://campusduka-api.onrender.com/products"
);

const products=
await response.json();

const events=

products.filter(
product=>

product.category==="Events"
);

const container=
document.getElementById(
"product-container"
);

container.innerHTML="";

events.forEach(product=>{

const imgs=

product.images&&
product.images.length

?

product.images

:

["images/event1.jpg"];


const first=
imgs[0];


container.innerHTML+=`

<div class="product-card">

<img src="${first}">

<h3>

${product.name}

</h3>

<p>

KES ${product.price}

</p>

<small>

${product.description}

</small>

<br>

<button
class="bn"
onclick='viewProduct(${JSON.stringify(imgs)})'>

View

</button>

</div>

`;

});

}



function viewProduct(images){

const modal=
document.getElementById(
"viewModal"
);

const main=
document.getElementById(
"mainImage"
);

const thumbs=
document.getElementById(
"thumbnails"
);

main.src=
images[0];

thumbs.innerHTML="";

images.forEach(img=>{

let t=
document.createElement(
"img"
);

t.src=img;

t.onclick=()=>{

main.src=img;

};

thumbs.appendChild(t);

});

modal.style.display=
"flex";

}


function closeModal(){

document
.getElementById(
"viewModal"
)
.style.display=
"none";

}


document.addEventListener(
"DOMContentLoaded",

loadProducts

);

</script>

</body>
</html>
